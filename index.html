<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <!-- 1. Рендеринг -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <!-- 2. БІНАРНИКИ (Виправляємо помилку export) -->
    <script src="xr.js"></script>
    <script type="module" src="xr-slam.js"></script> <!-- Додано type="module" -->

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #overlay { position: absolute; z-index: 100; width: 100%; height: 100%; pointer-events: none; }
        .ui { pointer-events: auto; }
        #enter-btn { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; font-size: 20px; background: #00bfff; color: #fff;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        }
        #instruction { 
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: white; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #reticle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.5);
            border-radius: 50%; display: none;
        }
        .ready { border-color: #00ffaa !important; box-shadow: 0 0 20px #00ffaa; }
        .hidden { display: none !important; }
    </style>

    <script>
        // Шляхи до воркерів
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        // Компонент плавання
        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {default: 0.5}, radius: {default: 2} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (t, dt) {
                this.angle += (this.data.speed * dt) / 1000;
                this.el.object3D.position.x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                this.el.object3D.position.z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                this.el.object3D.lookAt(
                    this.initialPos.x + Math.cos(this.angle + 0.1) * this.data.radius,
                    this.el.object3D.position.y,
                    this.initialPos.z + Math.sin(this.angle + 0.1) * this.data.radius
                );
            }
        });

        // Компонент кліку
        AFRAME.registerComponent('place-on-tap', {
            init: function () {
                this.world = document.querySelector('#world-group');
                this.reticle = document.querySelector('#reticle');
                this.placed = false;

                this.el.addEventListener('click', () => {
                    // Перевіряємо наявність XrController перед використанням
                    if (this.placed || !window.XR8 || !window.XR8.XrController) return;

                    window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then((hits) => {
                        if (hits.length > 0) {
                            const hit = hits[0];
                            this.world.object3D.position.copy(hit.position);
                            this.world.object3D.quaternion.copy(hit.rotation);
                            this.world.setAttribute('visible', 'true');
                            this.placed = true;
                            this.reticle.style.display = 'none';
                            document.querySelector('#instruction').innerHTML = "🐟 Океан розміщено!";
                        }
                    });
                });
            },
            tick: function() {
                if (this.placed || !window.XR8 || !window.XR8.XrController) return;

                window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then((hits) => {
                    if (hits.length > 0) this.reticle.classList.add('ready');
                    else this.reticle.classList.remove('ready');
                }).catch(() => {});
            }
        });

        // Функція запуску (Викликається кнопкою)
        window.startAR = function() {
            const scene = document.querySelector('a-scene');
            
            if (!window.XR8) {
                alert("Помилка: XR8 не завантажився. Перевірте консоль.");
                return;
            }

            // Масив модулів, які ТОЧНО є в бінарнику
            const modules = [];

            if (window.XR8.GlTextureRenderer) {
                modules.push(window.XR8.GlTextureRenderer.pipelineModule());
            }
            
            if (window.XR8.Threejs) {
                modules.push(window.XR8.Threejs.pipelineModule());
            }

            if (window.XR8.XrController) {
                modules.push(window.XR8.XrController.pipelineModule());
            }

            // Якщо AFrame модуля немає, 8th Wall все одно працюватиме через Threejs міст
            if (window.XR8.AFrame && typeof window.XR8.AFrame.pipelineModule === 'function') {
                modules.push(window.XR8.AFrame.pipelineModule());
            }

            // Додаємо зібрані модулі
            window.XR8.addCameraPipelineModules(modules);

            // Запуск
            window.XR8.run({
                canvas: scene.canvas,
                allowedDevices: 'any'
            });

            document.getElementById('enter-btn').classList.add('hidden');
            document.getElementById('reticle').style.display = 'block';
            document.getElementById('instruction').innerHTML = "Знайдіть поверхню підлоги";
            
            const audio = document.getElementById('ocean-sound');
            if (audio) audio.play();
        }
    </script>
</head>
<body>

    <div id="overlay">
        <div id="instruction" class="ui">Зачекайте, AR ініціалізується...</div>
        <div id="reticle"></div>
        <!-- Використовуємо window.startAR щоб уникнути проблем з областю видимості модулів -->
        <button id="enter-btn" class="ui" onclick="window.startAR()">🐬 УВІЙТИ В AR</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene
        place-on-tap
        xr-mode-ui="enabled: false"
        embedded
        renderer="colorManagement: true; antialias: true;">

        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
        </a-assets>

        <a-camera id="camera" position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 5 2" intensity="1"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1 -2" scale="0.2 0.2 0.2" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m2" position="1.5 0.5 -1" scale="0.3 0.3 0.3" animation-mixer territory-swim></a-entity>
        </a-entity>

    </a-scene>

    <script>
        // Перевірка завантаження модулів
        window.addEventListener('load', () => {
            const check = setInterval(() => {
                if (window.XR8) {
                    clearInterval(check);
                    document.getElementById('instruction').innerHTML = "Все готово! Натисніть кнопку.";
                }
            }, 500);
        });
    </script>

</body>
</html>
