<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
        #overlay { position:absolute; inset:0; z-index:100; pointer-events:none; }
        .ui { pointer-events:auto; }
        #enter-btn {
            position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
            padding:18px 50px; font-size:22px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 4px 20px rgba(0,191,255,0.5);
            font-weight:bold;
        }
        #instruction { 
            position:absolute; top:40px; width:100%; text-align:center; 
            color:white; font-size:19px; text-shadow:0 2px 8px #000; 
        }
    </style>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {default: 0.45}, radius: {default: 3.5} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (t, dt) {
                if (dt > 200) return;
                this.angle += (this.data.speed * dt) / 1000;
                const p = this.el.object3D.position;
                p.x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                p.z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                this.el.object3D.lookAt(this.initialPos.x, p.y, this.initialPos.z);
            }
        });
    </script>
</head>
<body>
    <div id="overlay">
        <div id="instruction" class="ui">Завантаження AR...</div>
        <button id="enter-btn" class="ui" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ (Задня камера)</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene 
        xr-mode-ui="enabled: false" 
        embedded 
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
            <a-asset-item id="m3" src="assets/models/animal3.glb"></a-asset-item>
            <a-asset-item id="m4" src="assets/models/animal4.glb"></a-asset-item>
        </a-assets>

        <a-camera id="ar-camera" position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="2 10 4" intensity="1.2"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1.2 -3"   scale="0.25 0.25 0.25" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m2" position="2 0.8 -2.5" scale="0.22 0.22 0.22" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m3" position="-2 1.4 -4"  scale="0.20 0.20 0.20" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m4" position="1.8 0.6 -5" scale="0.28 0.28 0.28" animation-mixer territory-swim></a-entity>
        </a-entity>
    </a-scene>

    <script>
        async function startAR() {
            const scene = document.querySelector('a-scene');
            const cameraEl = document.querySelector('#ar-camera');
            let threeCamera = cameraEl.getObject3D('camera');

            if (!window.XR8) {
                alert("XR8 не знайдено. Перевір xr-standalone/xr.js");
                return;
            }

            // Важливе очікування камери
            if (!threeCamera) {
                await new Promise(resolve => {
                    const checkCam = setInterval(() => {
                        threeCamera = cameraEl.getObject3D('camera');
                        if (threeCamera) {
                            clearInterval(checkCam);
                            resolve();
                        }
                    }, 100);
                });
            }

            try {
                console.log("Запуск XR8...");

                const pipelineModules = [
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ];

                XR8.addCameraPipelineModules(pipelineModules);

                await XR8.run({
                    canvas: scene.canvas,
                    camera: threeCamera,
                    allowedDevices: 'any',
                    // Примусово використовуємо задню камеру
                    preferredCamera: 'environment'   // 'environment' = задня камера
                });

                // Показуємо контент
                document.querySelector('#world-group').setAttribute('visible', 'true');

                document.getElementById('enter-btn').classList.add('hidden');
                document.getElementById('instruction').innerHTML = "🐟 Підводний світ запущено!<br>Рухай телефоном";

                document.getElementById('ocean-sound').play().catch(() => {});
                console.log("✅ AR запущено (задня камера)");

            } catch (err) {
                console.error("Помилка запуску AR:", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR.<br>Спробуй на телефоні";
            }
        }

        window.startAR = startAR;

        document.querySelector('a-scene').addEventListener('loaded', () => {
            document.getElementById('instruction').textContent = "Готово! Натисни кнопку 👇";
        });
    </script>
</body>
</html>
