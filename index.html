<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Підводний світ AR</title>

<script src="xr-standalone/xr.js"></script>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
#overlay {
  position:absolute; inset:0; z-index:10;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  color:white; pointer-events:none;
}
#btn {
  padding:20px 60px; font-size:22px;
  background:#00bfff; border:none; border-radius:50px;
  color:white; font-weight:bold; pointer-events:auto;
}
#text { margin-bottom:30px; font-size:20px; text-align:center; }
</style>
</head>

<body>

<div id="overlay">
  <div id="text">Натисни кнопку → наведи на підлогу → тапни</div>
  <button id="btn">🐬 START AR</button>
</div>

<audio id="sound" loop src="assets/sounds/okean.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
window.XR8Config = {
  webWorkerPath: 'resources/media-worker.js',
  tflitePath: 'resources/'
};

let xrScene;
let worldGroup;
let models = [];
let placed = false;

const loader = new THREE.GLTFLoader();

// 🐟 ЗАВАНТАЖЕННЯ МОДЕЛІ
function loadModel(url, scale=0.25) {
  return new Promise(resolve=>{
    loader.load(url, gltf=>{
      const m = gltf.scene;
      m.scale.set(scale,scale,scale);

      m.userData = {
        angle: Math.random()*Math.PI*2,
        radius: 2 + Math.random()*2,
        speed: 0.008 + Math.random()*0.015,
        yOffset: Math.random()*1.2,
        vx: 0,
        vz: 0
      };

      resolve(m);
    }, undefined, ()=>resolve(null));
  });
}

// 🐠 АНІМАЦІЯ З РЕАКЦІЄЮ
function animate() {
  const t = Date.now()*0.001;

  models.forEach((m,i)=>{
    const d = m.userData;

    d.angle += d.speed;

    let x = Math.cos(d.angle)*d.radius;
    let z = Math.sin(d.angle)*d.radius;

    // інерція після втечі
    d.vx *= 0.92;
    d.vz *= 0.92;

    x += d.vx;
    z += d.vz;

    const y = d.yOffset + Math.sin(t*1.8+i)*0.5;

    m.position.set(x,y,z);

    // напрям руху
    m.lookAt(
      x + d.vx*2 + Math.cos(d.angle),
      y,
      z + d.vz*2 + Math.sin(d.angle)
    );
  });
}

// 🎯 XR MODULE
const threeModule = XR8.Threejs.pipelineModule({
  onStart: ({canvas}) => {

    xrScene = XR8.Threejs.xrScene();
    const {scene} = xrScene;

    // 🌊 атмосфера
    scene.fog = new THREE.Fog(0x88bbff, 5, 30);
    scene.background = new THREE.Color(0x112244);

    // 💡 світло
    scene.add(new THREE.AmbientLight(0xaaccff, 0.9));
    const dir = new THREE.DirectionalLight(0xffffff,1);
    dir.position.set(5,15,10);
    scene.add(dir);

    worldGroup = new THREE.Group();
    scene.add(worldGroup);
    worldGroup.visible = false;

    // 👆 TAP
    canvas.addEventListener('touchstart', (e)=>{

      const x = e.touches[0].clientX / window.innerWidth;
      const y = e.touches[0].clientY / window.innerHeight;

      // 📍 placement
      if (!placed) {
        const hits = XR8.XrController.hitTest(x,y,['surface']);
        if (hits.length>0){
          const h = hits[0];
          worldGroup.position.copy(h.position);
          worldGroup.quaternion.copy(h.rotation);
          worldGroup.visible = true;
          placed = true;

          document.getElementById('text').innerHTML =
            "✅ Рибки з'явились! Торкнись їх 🐟";

          document.getElementById('sound').play().catch(()=>{});
        }
        return;
      }

      // 🐟 РЕАКЦІЯ
      const touchX = (x - 0.5) * 6;
      const touchZ = (y - 0.5) * 6;

      models.forEach(m=>{
        const dx = m.position.x - touchX;
        const dz = m.position.z - touchZ;
        const dist = Math.sqrt(dx*dx + dz*dz) + 0.001;

        const force = 0.15 / dist;

        m.userData.vx += dx * force;
        m.userData.vz += dz * force;
      });

    });

    // 🐠 завантаження моделей
    const paths = [
      'assets/models/animal1.glb',
      'assets/models/animal2.glb',
      'assets/models/animal3.glb',
      'assets/models/animal4.glb'
    ];

    Promise.all(paths.map(p=>loadModel(p,0.23)))
    .then(res=>{
      res.forEach(m=>{
        if (!m) return;
        models.push(m);
        worldGroup.add(m);
      });
    });

  },

  onUpdate: () => {
    if (placed) animate();
  }
});

// 🚀 START
async function startAR(){
  document.getElementById('btn').style.display='none';
  document.getElementById('text').innerHTML="Запуск AR...";

  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    threeModule,
    XR8.XrController.pipelineModule()
  ]);

  await XR8.run({
    canvas: document.createElement('canvas'),
    allowedDevices:'any',
    preferredCamera:'environment'
  });

  document.body.appendChild(XR8.Threejs.xrScene().canvas);
}

document.getElementById('btn').onclick = startAR;
</script>

</body>
</html>
