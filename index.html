<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; }
        #overlay { 
            position:absolute; inset:0; z-index:100; pointer-events:none; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; color:white;
        }
        #enter-btn {
            padding:22px 70px; font-size:24px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 8px 30px rgba(0,191,255,0.6);
            font-weight:bold; pointer-events:auto;
        }
        #instruction { 
            margin-bottom:40px; font-size:21px; text-align:center; 
            text-shadow:0 2px 10px #000; 
        }
        canvas { display:block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="instruction">Наведи на підлогу та тапни</div>
        <button id="enter-btn" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        let worldGroup;
        let models = [];
        let isPlaced = false;
        let xrSceneRef = null;

        async function loadModel(url, scale = 0.24) {
            return new Promise(resolve => {
                const loader = new THREE.GLTFLoader();
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(scale, scale, scale);
                    model.userData = {
                        angle: Math.random() * Math.PI * 2,
                        radius: 2.8 + Math.random() * 2.2,
                        speed: 0.009 + Math.random() * 0.018,
                        heightOffset: Math.random() * 1.4
                    };
                    resolve(model);
                }, undefined, () => resolve(null));
            });
        }

        const animate = () => {
            const t = Date.now() * 0.001;

            models.forEach((model, i) => {
                if (!model.userData.angle) return;

                model.userData.angle += model.userData.speed;

                const r = model.userData.radius;
                const dx = Math.cos(model.userData.angle + i);
                const dz = Math.sin(model.userData.angle + i);

                model.position.x = dx * r;
                model.position.z = dz * r - 3.5;
                model.position.y = model.userData.heightOffset + Math.sin(t * 1.6 + i) * 0.75;

                // Природний lookAt по напрямку руху
                model.lookAt(
                    model.position.x + dx * 2,
                    model.position.y + 0.4,
                    model.position.z + dz * 2
                );
            });
        };

        async function startAR() {
            document.getElementById('instruction').innerHTML = "Запуск AR...";
            document.getElementById('enter-btn').style.display = 'none';

            try {
                // Правильна ініціалізація pipeline
                const threeModule = XR8.Threejs.pipelineModule({
                    onStart: ({ canvas }) => {
                        xrSceneRef = XR8.Threejs.xrScene();
                        const { scene, camera } = xrSceneRef;

                        // Підводна атмосфера
                        scene.fog = new THREE.Fog(0x88bbff, 8, 40);
                        scene.background = new THREE.Color(0x112244);

                        // Освітлення
                        scene.add(new THREE.AmbientLight(0xaaccff, 0.95));
                        const dirLight = new THREE.DirectionalLight(0xffffff, 1.05);
                        dirLight.position.set(5, 14, 10);
                        scene.add(dirLight);

                        worldGroup = new THREE.Group();
                        scene.add(worldGroup);

                        // Завантаження моделей
                        const paths = [
                            'assets/models/animal1.glb',
                            'assets/models/animal2.glb',
                            'assets/models/animal3.glb',
                            'assets/models/animal4.glb'
                        ];

                        Promise.all(paths.map(p => loadModel(p))).then(loadedModels => {
                            loadedModels.forEach(model => {
                                if (model) {
                                    models.push(model);
                                    worldGroup.add(model);
                                }
                            });
                        });
                    },
                    onUpdate: animate
                });

                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    threeModule,
                    XR8.XrController.pipelineModule()
                ]);

                await XR8.run({
                    allowedDevices: 'any',
                    preferredCamera: 'environment'
                });

                worldGroup.visible = false;

                // Реальний tap-to-place по точці дотику
                const canvas = xrSceneRef.canvas;
                canvas.addEventListener('touchstart', (e) => {
                    if (isPlaced || !xrSceneRef) return;

                    const touch = e.touches[0];
                    const x = touch.clientX / window.innerWidth;
                    const y = touch.clientY / window.innerHeight;

                    const hits = XR8.XrController.hitTest(x, y, ['surface']);

                    if (hits && hits.length > 0) {
                        const hit = hits[0];
                        worldGroup.position.copy(hit.position);
                        worldGroup.quaternion.copy(hit.rotation);
                        worldGroup.visible = true;
                        isPlaced = true;

                        document.getElementById('instruction').innerHTML = "✅ Рибки плавають у твоїй кімнаті!<br>Рухай телефоном";
                    }
                });

                document.getElementById('instruction').innerHTML = "Наведи на підлогу та тапни";

                document.getElementById('ocean-sound').play().catch(() => {});

            } catch (err) {
                console.error("Помилка запуску AR:", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR";
            }
        }

        window.startAR = startAR;

        // Resize handling
        window.addEventListener('resize', () => {
            if (xrSceneRef && xrSceneRef.camera) {
                xrSceneRef.camera.aspect = window.innerWidth / window.innerHeight;
                xrSceneRef.camera.updateProjectionMatrix();
            }
        });
    </script>
</body>
</html>
