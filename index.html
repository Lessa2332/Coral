<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; }
        #overlay { position:absolute; inset:0; z-index:100; pointer-events:none; }
        .ui { pointer-events:auto; }
        #enter-btn {
            position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
            padding:22px 60px; font-size:24px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 8px 30px rgba(0,191,255,0.6);
        }
        #instruction { position:absolute; top:60px; width:100%; text-align:center; color:white; font-size:21px; text-shadow:0 2px 10px #000; }
    </style>

    <script>
        window.XR8Config = { webWorkerPath: 'resources/media-worker.js', tflitePath: 'resources/' };
    </script>
</head>
<body>
    <div id="overlay">
        <div id="instruction" class="ui">Підготовка камери...</div>
        <button id="enter-btn" class="ui" onclick="startAR()">🐬 ЗАПУСТИТИ AR</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene id="ar-scene" xr-mode-ui="enabled: false" embedded renderer="colorManagement: true; antialias: true;">
        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
        </a-assets>

        <a-camera id="ar-camera" position="0 1.6 0"></a-camera>
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="2 10 5" intensity="1.2"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1 -3" scale="0.25 0.25 0.25" animation-mixer></a-entity>
            <a-entity gltf-model="#m2" position="2 0.8 -3" scale="0.22 0.22 0.22" animation-mixer></a-entity>
        </a-entity>
    </a-scene>

    <script>
        async function startAR() {
            document.getElementById('instruction').textContent = "Ініціалізація XR...";

            await new Promise(r => setTimeout(r, 800)); // велика затримка

            const scene = document.querySelector('#ar-scene');
            const cameraEl = document.querySelector('#ar-camera');
            let threeCamera = cameraEl.getObject3D('camera');

            // Максимальне очікування камери
            for (let i = 0; i < 50 && !threeCamera; i++) {
                await new Promise(r => setTimeout(r, 100));
                threeCamera = cameraEl.getObject3D('camera');
            }

            if (!threeCamera || !window.XR8) {
                alert("Камера не готова. Перезавантаж сторінку.");
                return;
            }

            try {
                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ]);

                await XR8.run({
                    canvas: scene.canvas,
                    camera: threeCamera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'
                });

                document.querySelector('#world-group').setAttribute('visible', 'true');
                document.getElementById('enter-btn').classList.add('hidden');
                document.getElementById('instruction').innerHTML = "✅ AR запущено!<br>Рухай телефон";

                document.getElementById('ocean-sound').play().catch(() => {});
                console.log("✅ AR запущено (з максимальною затримкою)");

            } catch (err) {
                console.error(err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR";
            }
        }

        window.startAR = startAR;
    </script>
</body>
</html>
