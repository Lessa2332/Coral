<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підводний світ — Coral</title>
  
  <!-- A-Frame та додаткові компоненти -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/[email protected]/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin:0; overflow:hidden; font-family: 'Arial', sans-serif; }
    
    #enter-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 18px 40px;
      font-size: 24px;
      background: #00bfff;
      color: white;
      border: none;
      border-radius: 60px;
      z-index: 999;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,0.5);
      font-weight: bold;
    }
    
    #loading {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 1000;
      display: none;
      font-size: 18px;
    }
    
    #status {
      position: absolute;
      top: 80px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      color: #00ffaa;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="loading">🔍 Скануємо кімнату...</div>
  <div id="status">🌊 Підводний світ</div>
  
  <button id="enter-btn">🐬 Увійти в AR</button>

  <!-- AR СЦЕНА -->
  <a-scene
    background="color: #001133"
    fog="type: linear; color: #001133; near: 2; far: 20"
    xr-mode-ui="enabled: false"
    vr-mode-ui="enabled: false">

    <!-- Камера -->
    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <!-- Освітлення -->
    <a-light type="ambient" color="#88ccff" intensity="0.6"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.2" position="2 5 3"></a-light>
    
    <!-- Допоміжна підлога -->
    <a-plane rotation="-90 0 0" position="0 0 0" width="20" height="20" color="#113366" material="side:double; transparent:true; opacity:0.3"></a-plane>

    <!-- ========== МОРСЬКІ ТВАРИНИ ========== -->
    <a-entity id="creature1"
      gltf-model="url(assets/models/animal1.glb)"
      position="1.2 0.8 2.5"
      scale="0.35 0.35 0.35"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature">
    </a-entity>

    <a-entity id="creature2"
      gltf-model="url(assets/models/animal2.glb)"
      position="-2.0 1.0 3.0"
      scale="0.4 0.4 0.4"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature">
    </a-entity>

    <a-entity id="creature3"
      gltf-model="url(assets/models/animal3.glb)"
      position="3.0 1.5 2.0"
      scale="0.3 0.3 0.3"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature">
    </a-entity>

    <!-- Бульбашки -->
    <a-entity particle-system="preset: dust; color: #aaddff; particleCount: 30; velocity: 0.1 0.1 0;"></a-entity>
  </a-scene>

  <script>
    // ========== НАЛАШТУВАННЯ 8TH WALL ==========
    window.XR8 = window.XR8 || {};
    XR8.assetRoot = './';
    
    // Додаємо SLAM-модуль
    XR8.addChunk = XR8.addChunk || function(name, url) {
      if (!window.XR8CHUNKS) window.XR8CHUNKS = {};
      window.XR8CHUNKS[name] = url;
    };
    XR8.addChunk('slam', 'xr-slam.js');
    
    // Завантажуємо основний файл xr.js
    const script = document.createElement('script');
    script.src = 'xr.js';
    script.async = true;
    script.setAttribute('data-preload-chunks', 'slam');
    script.onerror = function() {
      document.getElementById('loading').innerHTML = '❌ Помилка: xr.js не знайдено!';
      console.error('xr.js not found');
    };
    document.head.appendChild(script);
    
    // ========== ЛОГІКА AR ==========
    const enterBtn = document.getElementById('enter-btn');
    const loadingDiv = document.getElementById('loading');
    
    function startAR() {
      loadingDiv.style.display = 'block';
      loadingDiv.innerHTML = '🔍 Завантаження SLAM...';
      
      // Перевіряємо наявність XR8
      if (typeof XR8 === 'undefined' || !XR8.XrController) {
        loadingDiv.innerHTML = '⏳ Очікування 8th Wall...';
        setTimeout(startAR, 1000);
        return;
      }
      
      loadingDiv.innerHTML = '✅ Готово! Запускаємо AR...';
      
      // Налаштовуємо XR8
      if (XR8.XrController && XR8.XrController.configure) {
        XR8.XrController.configure({ 
          disableWorldTracking: false,
          disableImageTargets: true,
          disableFaceTracking: true 
        });
      }
      
      // Запускаємо
      if (XR8.run) {
        XR8.run({ canvas: document.querySelector('a-scene canvas') });
      } else {
        // Альтернативний спосіб запуску
        const scene = document.querySelector('a-scene');
        if (scene && scene.enterVR) {
          scene.enterVR();
        }
      }
      
      setTimeout(() => {
        loadingDiv.style.display = 'none';
      }, 2000);
    }
    
    enterBtn.addEventListener('click', startAR);
    
    // ========== КОМПОНЕНТ "ПОГЛАДИТИ" ==========
    AFRAME.registerComponent('proximity-interaction', {
      init() {
        this.camera = document.querySelector('#camera');
        this.nearby = false;
      },
      
      tick() {
        if (!this.camera) return;
        
        const camPos = this.camera.object3D.position;
        const entityPos = this.el.object3D.position;
        const dist = camPos.distanceTo(entityPos);
        
        if (dist < 0.7 && !this.nearby) {
          this.nearby = true;
          this.el.setAttribute('scale', '0.5 0.5 0.5');
          this.el.setAttribute('material', 'emissive', '#ffaa00');
        } else if (dist >= 0.7 && this.nearby) {
          this.nearby = false;
          this.el.setAttribute('scale', '0.35 0.35 0.35');
          this.el.setAttribute('material', 'emissive', '#000000');
        }
      }
    });
    
    // Додаємо компонент до тварин
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.sea-creature').forEach(el => {
          el.setAttribute('proximity-interaction', '');
        });
      }, 3000);
    });
  </script>
</body>
</html>
