<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- 8th Wall Standalone - ТІЛЬКИ базовий xr.js -->
    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .ui { pointer-events: auto; }
        #enter-btn {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            padding: 18px 50px; font-size: 22px; background: #00bfff; color: white;
            border: none; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,191,255,0.5);
            font-weight: bold;
        }
        #instruction { 
            position: absolute; top: 40px; width: 100%; text-align: center; 
            color: white; font-size: 19px; text-shadow: 0 2px 8px #000; 
        }
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; border: 3px solid rgba(255,255,255,0.7);
            border-radius: 50%; display: none;
        }
        .ready { border-color: #00ffaa !important; box-shadow: 0 0 25px #00ffaa; }
    </style>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        // Компонент плавання риб
        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {default: 0.45}, radius: {default: 3.5}, height: {default: 0.8} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (t, dt) {
                if (dt > 200) return;
                this.angle += (this.data.speed * dt) / 1000;
                const p = this.el.object3D.position;
                p.x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                p.z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                p.y = this.initialPos.y + Math.sin(this.angle * 1.8) * this.data.height;

                this.el.object3D.lookAt(
                    this.initialPos.x + Math.cos(this.angle + 0.4) * this.data.radius,
                    p.y + 0.3,
                    this.initialPos.z + Math.sin(this.angle + 0.4) * this.data.radius
                );
            }
        });

        // Компонент Tap to Place
        AFRAME.registerComponent('place-on-tap', {
            init: function () {
                this.world = document.querySelector('#world-group');
                this.reticle = document.querySelector('#reticle');
                this.placed = false;

                this.el.addEventListener('click', () => {
                    if (this.placed || !window.XR8?.XrController) return;

                    window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then(hits => {
                        if (hits && hits.length > 0) {
                            const hit = hits[0];
                            this.world.object3D.position.copy(hit.position);
                            this.world.object3D.quaternion.copy(hit.rotation);
                            this.world.setAttribute('visible', 'true');
                            this.placed = true;
                            this.reticle.style.display = 'none';
                            document.getElementById('instruction').innerHTML = "🐟 Підводний світ розміщено!";
                        }
                    }).catch(console.error);
                });
            },
            tick: function () {
                if (this.placed || !window.XR8?.XrController) return;
                window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then(hits => {
                    if (hits && hits.length > 0) this.reticle.classList.add('ready');
                    else this.reticle.classList.remove('ready');
                }).catch(() => {});
            }
        });
    </script>
</head>
<body>
    <div id="overlay">
        <div id="instruction" class="ui">Завантаження AR...</div>
        <div id="reticle"></div>
        <button id="enter-btn" class="ui" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene 
        place-on-tap 
        xr-mode-ui="enabled: false" 
        embedded 
        renderer="colorManagement: true; antialias: true;">

        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
            <a-asset-item id="m3" src="assets/models/animal3.glb"></a-asset-item>
            <a-asset-item id="m4" src="assets/models/animal4.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.65"></a-light>
        <a-light type="directional" position="2 10 4" intensity="1.2"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1.2 -3"   scale="0.25 0.25 0.25" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m2" position="2 0.8 -2.5" scale="0.22 0.22 0.22" animation-mixer territory-swim="speed:0.38; radius:4"></a-entity>
            <a-entity gltf-model="#m3" position="-2 1.4 -4"  scale="0.20 0.20 0.20" animation-mixer territory-swim="speed:0.5; radius:2.8"></a-entity>
            <a-entity gltf-model="#m4" position="1.8 0.6 -5" scale="0.28 0.28 0.28" animation-mixer territory-swim></a-entity>
        </a-entity>
    </a-scene>

    <script>
        async function startAR() {
            const scene = document.querySelector('a-scene');
            const cameraEl = document.querySelector('a-camera');
            const threeCamera = cameraEl.getObject3D('camera');

            if (!window.XR8) {
                alert("XR8 не завантажився. Перевір консоль (F12) і структуру папок.");
                return;
            }
            if (!threeCamera) {
                console.error("Камера A-Frame ще не готова");
                return;
            }

            try {
                const pipelineModules = [
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule(),
                    XR8.XrController.pipelineModule()
                ];

                XR8.addCameraPipelineModules(pipelineModules);

                await XR8.run({
                    canvas: scene.canvas,
                    camera: threeCamera,
                    allowedDevices: 'any'
                });

                // Успішний запуск
                document.getElementById('enter-btn').classList.add('hidden');
                document.getElementById('reticle').style.display = 'block';
                document.getElementById('instruction').textContent = "Наведи на підлогу та тапни";

                document.getElementById('ocean-sound').play().catch(() => {});
                console.log("✅ AR успішно запущено");
            } catch (err) {
                console.error("Помилка запуску AR:", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR.<br>Перевір консоль (F12)";
            }
        }

        // Чекаємо повного завантаження сцени
        document.querySelector('a-scene').addEventListener('loaded', () => {
            document.getElementById('instruction').textContent = "Готово! Натисни кнопку нижче 👇";
        });
    </script>
</body>
</html>
