<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
        #overlay { position:absolute; inset:0; z-index:100; pointer-events:none; }
        .ui { pointer-events:auto; }
        #enter-btn {
            position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
            padding:20px 50px; font-size:22px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 4px 20px rgba(0,191,255,0.5);
            font-weight:bold;
        }
        #instruction { 
            position:absolute; top:40px; width:100%; text-align:center; 
            color:white; font-size:19px; text-shadow:0 2px 8px #000; 
        }
    </style>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        // Просте плавання
        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {default: 0.4}, radius: {default: 3.2} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (t, dt) {
                if (dt > 300) return;
                this.angle += (this.data.speed * dt) / 1000;
                const p = this.el.object3D.position;
                p.x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                p.z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                this.el.object3D.lookAt(this.initialPos.x, p.y + 0.5, this.initialPos.z);
            }
        });
    </script>
</head>
<body>
    <div id="overlay">
        <div id="instruction" class="ui">Підготовка AR...</div>
        <button id="enter-btn" class="ui" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene 
        id="ar-scene"
        xr-mode-ui="enabled: false" 
        embedded 
        renderer="colorManagement: true; antialias: true;">

        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
            <a-asset-item id="m3" src="assets/models/animal3.glb"></a-asset-item>
            <a-asset-item id="m4" src="assets/models/animal4.glb"></a-asset-item>
        </a-assets>

        <a-camera id="ar-camera" position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.75"></a-light>
        <a-light type="directional" position="3 12 5" intensity="1.1"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1 -3"   scale="0.25 0.25 0.25" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m2" position="2.2 0.7 -2.8" scale="0.22 0.22 0.22" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m3" position="-2.1 1.3 -4" scale="0.19 0.19 0.19" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m4" position="1.5 0.5 -5.5" scale="0.27 0.27 0.27" animation-mixer territory-swim></a-entity>
        </a-entity>
    </a-scene>

    <script>
        async function startAR() {
            const scene = document.querySelector('#ar-scene');
            const cameraEl = document.querySelector('#ar-camera');

            if (!window.XR8) {
                alert("Не знайдено xr.js. Перевір структуру репозиторію.");
                return;
            }

            // Чекаємо готовності камери A-Frame
            let threeCamera = cameraEl.getObject3D('camera');
            if (!threeCamera) {
                await new Promise(resolve => {
                    const interval = setInterval(() => {
                        threeCamera = cameraEl.getObject3D('camera');
                        if (threeCamera) {
                            clearInterval(interval);
                            resolve();
                        }
                    }, 150);
                });
            }

            try {
                console.log("Запуск XR8...");

                // Мінімальний набір модулів
                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ]);

                await XR8.run({
                    canvas: scene.canvas,
                    camera: threeCamera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'   // задня камера
                });

                // Показуємо риб
                document.querySelector('#world-group').setAttribute('visible', 'true');

                document.getElementById('enter-btn').classList.add('hidden');
                document.getElementById('instruction').innerHTML = "✅ Підводний світ запущено!<br>Рухай телефоном, щоб побачити риб";

                document.getElementById('ocean-sound').play().catch(e => console.log("Sound blocked"));

                console.log("✅ AR запущено (мінімальний режим)");

            } catch (err) {
                console.error("Помилка XR8.run():", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску.<br>Спробуй перезавантажити сторінку";
            }
        }

        window.startAR = startAR;

        // Після завантаження сцени
        document.querySelector('a-scene').addEventListener('loaded', () => {
            document.getElementById('instruction').textContent = "Готово! Натисни велику кнопку 👇";
        });
    </script>
</body>
</html>
