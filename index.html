<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Підводний світ AR</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #overlay {
      position:absolute; inset:0; z-index:100; pointer-events:none;
      display:flex; flex-direction:column; justify-content:center; align-items:center; color:white;
    }
    #btn {
      padding:22px 70px; font-size:24px; background:#00bfff; color:white;
      border:none; border-radius:50px; box-shadow:0 8px 30px rgba(0,191,255,0.6);
      font-weight:bold; pointer-events:auto;
    }
    #text {
      margin-bottom:40px; font-size:21px; text-align:center;
      text-shadow:0 2px 10px #000;
    }
    canvas { display:block; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="text">Натисни кнопку → наведи на підлогу → тапни</div>
    <button id="btn">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
  </div>
  <audio id="sound" loop src="assets/sounds/okean.mp3"></audio>

  <!-- Three.js та GLTFLoader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Конфігурація xr-standalone – ПЕРЕД завантаженням xr.js -->
  <script>
    window.XR8Config = {
      webWorkerPath: 'xr-standalone/resources/media-worker.js',
      tflitePath: 'xr-standalone/resources/'
    };
  </script>

  <!-- xr-standalone (звичайні скрипти, без модулів) -->
  <script src="xr-standalone/xr.js"></script>
  <script src="xr-standalone/xr-slam.js"></script>

  <!-- Кастомний модуль Three.js (глобальна функція) – він буде використаний замість стандартного -->
  <script src="customThreejsModule.js"></script>

  <script>
    let xrSceneRef = null;
    let worldGroup = null;
    let models = [];
    let placed = false;

    // Завантаження моделі GLB
    async function loadModel(url, scale = 0.23) {
      return new Promise(resolve => {
        const loader = new THREE.GLTFLoader();
        loader.load(url, gltf => {
          const m = gltf.scene;
          m.scale.set(scale, scale, scale);
          m.userData = {
            angle: Math.random() * Math.PI * 2,
            radius: 2.8 + Math.random() * 2.2,
            speed: 0.009 + Math.random() * 0.018,
            heightOffset: Math.random() * 1.4,
            vx: 0, vz: 0
          };
          resolve(m);
        }, undefined, () => resolve(null));
      });
    }

    // Анімація рибок
    const animateFish = () => {
      const t = Date.now() * 0.001;
      models.forEach((m, i) => {
        if (!m.userData) return;
        m.userData.angle += m.userData.speed;

        const r = m.userData.radius;
        const dx = Math.cos(m.userData.angle + i);
        const dz = Math.sin(m.userData.angle + i);

        m.userData.vx *= 0.98;
        m.userData.vz *= 0.98;
        m.position.x += m.userData.vx;
        m.position.z += m.userData.vz;

        const maxDist = 4.5;
        let dist = Math.hypot(m.position.x, m.position.z + 3.5);
        if (dist > maxDist) {
          m.position.x *= maxDist / dist;
          m.position.z = (m.position.z + 3.5) * (maxDist / dist) - 3.5;
        }

        m.position.x += dx * r * 0.02;
        m.position.z += dz * r * 0.02;
        m.position.y = m.userData.heightOffset + Math.sin(t * 1.6 + i) * 0.75;

        const dir = new THREE.Vector3(dx, 0, dz).normalize();
        m.lookAt(m.position.clone().add(dir));
      });
    };

    // Створюємо кастомний модуль Three.js
    const threeModule = customThreejsPipelineModule();

    async function startAR() {
      const btn = document.getElementById('btn');
      const text = document.getElementById('text');
      btn.style.display = 'none';
      text.innerHTML = "Запуск AR...";

      // Чекаємо готовності XR8 та модулів
      let attempts = 0;
      while ((!window.XR8 || !XR8.GlTextureRenderer || !XR8.XrController) && attempts < 80) {
        await new Promise(r => setTimeout(r, 120));
        attempts++;
      }

      if (!window.XR8 || !XR8.GlTextureRenderer || !XR8.XrController) {
        text.innerHTML = "Помилка: XR8 модулі не завантажились";
        console.error("XR8 modules missing", window.XR8);
        return;
      }

      try {
        // Додаємо модулі конвеєра
        XR8.addCameraPipelineModules([
          XR8.GlTextureRenderer.pipelineModule(),
          threeModule,
          XR8.XrController.pipelineModule()
        ]);

        // Запускаємо камеру
        await XR8.run({
          allowedDevices: 'any',
          preferredCamera: 'environment'
        });

        xrSceneRef = XR8.Threejs.xrScene();
        const { scene } = xrSceneRef;

        // Налаштовуємо сцену підводного світу
        scene.fog = new THREE.Fog(0x88bbff, 8, 40);
        scene.background = new THREE.Color(0x112244);

        scene.add(new THREE.AmbientLight(0xaaccff, 0.95));
        const dir = new THREE.DirectionalLight(0xffffff, 1.05);
        dir.position.set(5, 15, 10);
        scene.add(dir);

        worldGroup = new THREE.Group();
        scene.add(worldGroup);
        worldGroup.visible = false;

        const paths = [
          'assets/models/animal1.glb',
          'assets/models/animal2.glb',
          'assets/models/animal3.glb',
          'assets/models/animal4.glb'
        ];
        const loadedModels = await Promise.all(paths.map(p => loadModel(p)));
        loadedModels.forEach(m => {
          if (m) {
            models.push(m);
            worldGroup.add(m);
          }
        });

        const canvas = document.querySelector('canvas');
        canvas.addEventListener('touchstart', (e) => {
          if (!xrSceneRef) return;

          const touch = e.touches[0];
          const x = touch.clientX / window.innerWidth;
          const y = touch.clientY / window.innerHeight;

          if (!placed) {
            const hits = XR8.XrController.hitTest(x, y, ['surface']);
            if (hits && hits.length > 0) {
              const h = hits[0];
              worldGroup.position.copy(h.position);
              worldGroup.quaternion.copy(h.rotation);
              worldGroup.visible = true;
              placed = true;

              text.innerHTML = "✅ Рибки з'явились! Торкнись їх 🐟";
              document.getElementById('sound').play().catch(() => {});
            }
            return;
          }

          // Реакція на дотик: рибки "тікають"
          const touchX = (x - 0.5) * 8;
          const touchZ = (y - 0.5) * 8;
          models.forEach(m => {
            const dx = m.position.x - touchX;
            const dz = m.position.z - touchZ;
            const dist = Math.sqrt(dx*dx + dz*dz) + 0.001;
            const force = 0.18 / dist;
            m.userData.vx += dx * force;
            m.userData.vz += dz * force;
          });
        });

        // Розширюємо onUpdate для анімації рибок
        const originalOnUpdate = threeModule.onUpdate;
        threeModule.onUpdate = (params) => {
          originalOnUpdate(params);
          if (placed) animateFish();
        };

      } catch (err) {
        console.error(err);
        text.innerHTML = "Помилка запуску AR: " + err.message;
      }
    }

    document.getElementById('btn').onclick = startAR;
  </script>
</body>
</html>
