<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Підводний світ AR (WebXR)</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 30px;
      font-size: 20px;
      background: #00bfff;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      z-index: 20;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    #btn:active { background: #0099cc; }
    @media (max-width: 600px) {
      #btn { padding: 12px 24px; font-size: 18px; }
      #info { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="info">Натисніть кнопку, щоб увімкнути AR. Потім торкніться поверхні, щоб розмістити рибок.</div>
  <button id="btn">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>

  <audio id="sound" loop src="assets/sounds/okean.mp3"></audio>

  <!-- Three.js та додаткові модулі (ES modules) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { XRButton } from 'three/addons/webxr/XRButton.js';

    // --- Налаштування сцени Three.js ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x112244);
    scene.fog = new THREE.Fog(0x88bbff, 8, 40);

    // Камера для AR буде отримана від WebXR
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.xr.enabled = true;  // увімкнення WebXR
    document.body.appendChild(renderer.domElement);

    // Освітлення
    const ambientLight = new THREE.AmbientLight(0xaaccff, 0.95);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.05);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    // Група, яка буде розміщена на поверхні
    let worldGroup = null;
    let models = [];
    let placed = false;
    let sound = document.getElementById('sound');

    // Завантаження моделей рибок (як у вашому проєкті)
    async function loadModel(url, scale = 0.23) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.load(url, gltf => {
          const m = gltf.scene;
          m.scale.set(scale, scale, scale);
          m.userData = {
            angle: Math.random() * Math.PI * 2,
            radius: 2.8 + Math.random() * 2.2,
            speed: 0.009 + Math.random() * 0.018,
            heightOffset: Math.random() * 1.4,
            vx: 0, vz: 0
          };
          resolve(m);
        }, undefined, reject);
      });
    }

    // Анімація рибок
    function animateFish() {
      const t = Date.now() * 0.001;
      models.forEach((m, i) => {
        if (!m.userData) return;
        m.userData.angle += m.userData.speed;

        const r = m.userData.radius;
        const dx = Math.cos(m.userData.angle + i);
        const dz = Math.sin(m.userData.angle + i);

        m.userData.vx *= 0.98;
        m.userData.vz *= 0.98;
        m.position.x += m.userData.vx;
        m.position.z += m.userData.vz;

        const maxDist = 4.5;
        let dist = Math.hypot(m.position.x, m.position.z + 3.5);
        if (dist > maxDist) {
          m.position.x *= maxDist / dist;
          m.position.z = (m.position.z + 3.5) * (maxDist / dist) - 3.5;
        }

        m.position.x += dx * r * 0.02;
        m.position.z += dz * r * 0.02;
        m.position.y = m.userData.heightOffset + Math.sin(t * 1.6 + i) * 0.75;

        const dir = new THREE.Vector3(dx, 0, dz).normalize();
        m.lookAt(m.position.clone().add(dir));
      });
    }

    // Функція, яка створює групу рибок після того, як моделі завантажені
    async function createWorldGroup() {
      const group = new THREE.Group();
      const paths = [
        'assets/models/animal1.glb',
        'assets/models/animal2.glb',
        'assets/models/animal3.glb',
        'assets/models/animal4.glb'
      ];
      const loaded = await Promise.all(paths.map(p => loadModel(p)));
      loaded.forEach(m => {
        if (m) {
          models.push(m);
          group.add(m);
        }
      });
      return group;
    }

    // Обробка дотику (WebXR hit test)
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    function onSelect(event) {
      if (!placed && hitTestSource) {
        // Виконуємо hit test у точці дотику
        const frame = renderer.xr.getSession()?.requestAnimationFrame?.();
        const xrViewerPose = frame?.getViewerPose?.(renderer.xr.referenceSpace);
        if (xrViewerPose) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(renderer.xr.referenceSpace);
            if (pose) {
              worldGroup.position.copy(pose.transform.position);
              worldGroup.quaternion.copy(pose.transform.orientation);
              worldGroup.visible = true;
              placed = true;
              document.getElementById('info').innerHTML = '✅ Рибки з\'явились! Торкнись їх 🐟';
              sound.play().catch(() => {});
            }
          }
        }
        return;
      }

      // Якщо вже розміщено – рибки "тікають" від дотику
      if (placed && worldGroup) {
        // Отримуємо напрямок дотику (у просторі сцени)
        // Тут можна використати hit test, щоб дізнатися точку торкання у світі, але для простоти зробимо умовну реакцію
        // Оскільки в Three.js WebXR немає прямого доступу до координат дотику у просторі світу без hit test,
        // ми можемо використати hit test знову, щоб отримати точку на поверхні.
        const frame = renderer.xr.getSession()?.requestAnimationFrame?.();
        const xrViewerPose = frame?.getViewerPose?.(renderer.xr.referenceSpace);
        if (xrViewerPose && hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(renderer.xr.referenceSpace);
            if (pose) {
              const touchPoint = pose.transform.position;
              // Стимулюємо рибок рухатися від цієї точки
              models.forEach(m => {
                const dx = m.position.x - touchPoint.x;
                const dz = m.position.z - touchPoint.z;
                const dist = Math.sqrt(dx*dx + dz*dz) + 0.001;
                const force = 0.18 / dist;
                m.userData.vx += dx * force;
                m.userData.vz += dz * force;
              });
            }
          }
        }
      }
    }

    // Ініціалізація WebXR сесії
    async function initXR() {
      const btn = document.getElementById('btn');
      btn.style.display = 'none';
      document.getElementById('info').innerHTML = 'Запуск AR...';

      try {
        // Завантажуємо групу рибок (поки невидиму)
        worldGroup = await createWorldGroup();
        scene.add(worldGroup);
        worldGroup.visible = false;

        // Створюємо сесію WebXR
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body }
        });
        renderer.xr.setSession(session);

        // Налаштовуємо hit test source
        const referenceSpace = await session.requestReferenceSpace('viewer');
        hitTestSource = await session.requestHitTestSource({ space: referenceSpace });
        hitTestSourceRequested = true;

        // Додаємо обробник подій (дотик)
        renderer.domElement.addEventListener('touchstart', onSelect);

        // Запускаємо анімаційний цикл
        renderer.setAnimationLoop(() => {
          if (placed) animateFish();
          renderer.render(scene, camera);
        });

        document.getElementById('info').innerHTML = 'AR готовий. Торкніться поверхні, щоб розмістити рибок.';
      } catch (err) {
        console.error(err);
        document.getElementById('info').innerHTML = 'Помилка: Ваш пристрій не підтримує WebXR AR. ' + err.message;
        btn.style.display = 'block';
      }
    }

    // Кнопка запуску
    document.getElementById('btn').addEventListener('click', initXR);
  </script>
</body>
</html>
