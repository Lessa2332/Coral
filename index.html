<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підводний світ — Coral</title>
  
  <!-- A-Frame та компоненти -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/[email protected]/dist/aframe-extras.min.js"></script>
  
  <!-- Підтримка розширень glTF -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    // Реєструємо розширення для GLTFLoader
    window.addEventListener('load', function() {
      if (AFRAME.THREE && AFRAME.THREE.GLTFLoader) {
        // Якщо є потрібне розширення, реєструємо
        console.log('GLTFLoader готовий');
      }
    });
  </script>
  
  <style>
    body { margin:0; overflow:hidden; font-family: 'Arial', sans-serif; }
    #enter-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 18px 40px; font-size: 24px; background: #00bfff; color: white;
      border: none; border-radius: 60px; z-index: 999; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,0.5); font-weight: bold;
    }
    #loading {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white; padding: 12px 24px;
      border-radius: 40px; z-index: 1000; display: none; font-size: 18px;
    }
    #status {
      position: absolute; top: 80px; left: 20px;
      background: rgba(0,0,0,0.5); color: #00ffaa; padding: 8px 16px;
      border-radius: 20px; font-size: 14px; z-index: 1000;
    }
    /* Кнопки регулювання масштабу */
    .scale-controls {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: flex; gap: 20px;
    }
    .scale-controls button {
      padding: 10px 20px; font-size: 20px; background: rgba(0,0,0,0.5);
      color: white; border: none; border-radius: 30px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="loading">🔍 Скануємо кімнату...</div>
  <div id="status">🌊 Підводний світ</div>
  
  <!-- Аудіо океану -->
  <audio id="ocean-sound" loop preload="auto">
    <source src="assets/sounds/okean.mp3" type="audio/mpeg">
  </audio>
  
  <button id="enter-btn">🐬 Увійти в AR</button>
  
  <!-- Кнопки масштабу -->
  <div class="scale-controls">
    <button id="scale-down">➖</button>
    <button id="scale-up">➕</button>
  </div>

  <!-- AR-сцена з повністю прозорим фоном (тільки моделі) -->
  <a-scene
    background="transparent"
    xr-mode-ui="enabled: false"
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true;">

    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <!-- М'яке освітлення для моделей -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="2 5 3"></a-light>
    
    <!-- ========== МОРСЬКІ ТВАРИНИ ========== -->
    <!-- Риби розміщені біля різних стін/кутів, щоб не перетинатися -->
    <a-entity id="fish1" gltf-model="url(assets/models/animal1.glb)" position="1.5 0.6 2.0" scale="0.15 0.15 0.15" animation-mixer="clip: *; loop: repeat;" class="fish" data-anchor="front-right"></a-entity>
    <a-entity id="fish2" gltf-model="url(assets/models/animal2.glb)" position="-1.8 1.0 1.5" scale="0.15 0.15 0.15" animation-mixer="clip: *; loop: repeat;" class="fish" data-anchor="front-left"></a-entity>
    <a-entity id="fish3" gltf-model="url(assets/models/animal3.glb)" position="2.2 0.8 -1.5" scale="0.15 0.15 0.15" animation-mixer="clip: *; loop: repeat;" class="fish" data-anchor="back-right"></a-entity>
    <a-entity id="fish4" gltf-model="url(assets/models/animal4.glb)" position="-2.0 1.2 -1.8" scale="0.15 0.15 0.15" animation-mixer="clip: *; loop: repeat;" class="fish" data-anchor="back-left"></a-entity>
    <a-entity id="fish6" gltf-model="url(assets/models/animal6.glb)" position="0.8 0.7 -2.2" scale="0.15 0.15 0.15" animation-mixer="clip: *; loop: repeat;" class="fish" data-anchor="center-back"></a-entity>

    <!-- Медуза (біля стелі, центр) -->
    <a-entity id="jellyfish" gltf-model="url(assets/models/animal7.glb)" position="0 2.0 1.0" scale="0.2 0.2 0.2" animation-mixer="clip: *; loop: repeat;" class="fish jelly" data-anchor="top"></a-entity>

    <!-- Морська зірка (на дні, не плаває) -->
    <a-entity id="starfish" gltf-model="url(assets/models/animal5.glb)" position="2.0 0.05 1.5" scale="0.2 0.2 0.2" rotation="0 0 0" class="star"></a-entity>
  </a-scene>

  <script>
    // ========== НАЛАШТУВАННЯ 8TH WALL ==========
    window.XR8 = window.XR8 || {};
    XR8.assetRoot = './';
    
    const script = document.createElement('script');
    script.src = 'xr.js';
    script.async = true;
    script.setAttribute('data-preload-chunks', 'slam');
    document.head.appendChild(script);
    
    // ========== КОМПОНЕНТ ПЛАВАННЯ З ТЕРИТОРІЯМИ ==========
    // Кожна риба має "якір" - точку навколо якої вона плаває
    AFRAME.registerComponent('territory-swim', {
      schema: {
        speed: {type: 'number', default: 0.3},
        radius: {type: 'number', default: 1.2},   // радіус території
        heightRange: {type: 'number', default: 0.8}, // діапазон по висоті
        changeInterval: {type: 'number', default: 6},
        anchor: {type: 'string', default: 'center'} // не використовується прямо, але для логіки
      },
      init: function() {
        // Запам'ятовуємо початкову позицію як якір (центр території)
        this.anchorPos = this.el.object3D.position.clone();
        this.targetPos = this.anchorPos.clone();
        this.timeSinceChange = 0;
        this.pickNewTarget();
      },
      pickNewTarget: function() {
        // Випадкова точка в межах сфери навколо якоря
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * this.data.radius;
        const heightOffset = (Math.random() - 0.5) * this.data.heightRange;
        
        this.targetPos.x = this.anchorPos.x + Math.cos(angle) * radius;
        this.targetPos.z = this.anchorPos.z + Math.sin(angle) * radius;
        this.targetPos.y = this.anchorPos.y + heightOffset;
        
        // Обмежуємо висоту, щоб не виходити за розумні межі
        this.targetPos.y = Math.max(0.3, Math.min(2.5, this.targetPos.y));
      },
      tick: function(time, delta) {
        this.timeSinceChange += delta / 1000;
        if (this.timeSinceChange > this.data.changeInterval) {
          this.pickNewTarget();
          this.timeSinceChange = 0;
        }
        
        var currentPos = this.el.object3D.position;
        var direction = new THREE.Vector3().subVectors(this.targetPos, currentPos);
        var distance = direction.length();
        
        if (distance < 0.1) {
          this.pickNewTarget();
        } else {
          direction.normalize();
          var move = direction.multiplyScalar(this.data.speed * delta / 1000);
          this.el.object3D.position.add(move);
          
          // Поворот у напрямку руху
          if (move.length() > 0.001) {
            var quat = new THREE.Quaternion();
            quat.setFromUnitVectors(new THREE.Vector3(0,0,1), move.clone().normalize());
            this.el.object3D.quaternion.slerp(quat, 0.1);
          }
        }
      }
    });
    
    // ========== КОМПОНЕНТ "ПОГЛАДИТИ" ==========
    AFRAME.registerComponent('proximity-interaction', {
      init: function() {
        this.camera = document.querySelector('#camera');
        this.nearby = false;
      },
      tick: function() {
        if (!this.camera) return;
        const camPos = this.camera.object3D.position;
        const entityPos = this.el.object3D.position;
        const dist = camPos.distanceTo(entityPos);
        
        if (dist < 0.7 && !this.nearby) {
          this.nearby = true;
          // Змінюємо напрямок (для риб)
          if (this.el.components['territory-swim']) {
            this.el.components['territory-swim'].pickNewTarget();
          }
          // Підсвічування
          this.el.setAttribute('material', 'emissive', '#ffaa00');
        } else if (dist >= 0.7 && this.nearby) {
          this.nearby = false;
          this.el.setAttribute('material', 'emissive', '#000000');
        }
      }
    });
    
    // ========== ЛОГІКА AR ==========
    const enterBtn = document.getElementById('enter-btn');
    const loadingDiv = document.getElementById('loading');
    const oceanSound = document.getElementById('ocean-sound');
    
    function startAR() {
      loadingDiv.style.display = 'block';
      loadingDiv.innerHTML = '🔍 Завантаження SLAM...';
      
      // Запускаємо звук
      oceanSound.play().catch(e => console.log('Аудіо не запустилось:', e));
      
      const checkXR8 = setInterval(() => {
        if (typeof XR8 !== 'undefined' && XR8.XrController) {
          clearInterval(checkXR8);
          loadingDiv.innerHTML = '✅ Готово! Запускаємо AR...';
          
          XR8.XrController.configure({ 
            disableWorldTracking: false,
            disableImageTargets: true,
            disableFaceTracking: true 
          });
          
          XR8.run({ canvas: document.querySelector('a-scene canvas') });
          
          setTimeout(() => {
            loadingDiv.style.display = 'none';
          }, 2000);
        }
      }, 500);
    }
    
    enterBtn.addEventListener('click', startAR);
    
    // ========== РЕГУЛЮВАННЯ МАСШТАБУ ==========
    let currentScale = 0.15;
    document.getElementById('scale-up')?.addEventListener('click', () => {
      currentScale += 0.05;
      document.querySelectorAll('.fish').forEach(el => el.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`));
    });
    document.getElementById('scale-down')?.addEventListener('click', () => {
      currentScale = Math.max(0.05, currentScale - 0.05);
      document.querySelectorAll('.fish').forEach(el => el.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`));
    });
    
    // ========== ІНІЦІАЛІЗАЦІЯ ==========
    window.addEventListener('load', () => {
      // Додаємо компонент плавання з територіями до всіх риб
      document.querySelectorAll('.fish').forEach(el => {
        // Можна налаштувати параметри залежно від якоря
        const anchor = el.getAttribute('data-anchor');
        let speed = 0.3;
        let radius = 1.2;
        if (anchor === 'top') {
          speed = 0.2;
          radius = 0.8;
        } else if (anchor.includes('back')) {
          radius = 1.5; // більше місця біля задніх стін
        }
        el.setAttribute('territory-swim', `speed: ${speed}; radius: ${radius};`);
        el.setAttribute('proximity-interaction', '');
      });
      
      // Зірці – тільки взаємодія
      const star = document.querySelector('.star');
      if (star) star.setAttribute('proximity-interaction', '');
    });
  </script>
</body>
</html>
