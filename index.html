<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Підводний світ AR (WebXR)</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 30px;
      font-size: 20px;
      background: #00bfff;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      z-index: 20;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    #btn:active { background: #0099cc; }
    @media (max-width: 600px) {
      #btn { padding: 12px 24px; font-size: 18px; }
      #info { font-size: 14px; }
    }
    .controls-note {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="info">Перевірка підтримки AR...</div>
  <button id="btn">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
  <div id="controls-note" class="controls-note" style="display: none;">🖱️ Обертай сцену пальцем/мишею</div>

  <audio id="sound" loop src="assets/sounds/okean.mp3"></audio>

  <!-- Three.js та додаткові модулі -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.134.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Спільні налаштування ---
    let scene, camera, renderer, worldGroup, models = [], placed = false, sound;
    let arMode = false;  // чи працюємо в AR
    let controls = null;

    // Завантаження моделей рибок
    async function loadModel(url, scale = 0.23) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.load(url, gltf => {
          const m = gltf.scene;
          m.scale.set(scale, scale, scale);
          m.userData = {
            angle: Math.random() * Math.PI * 2,
            radius: 2.8 + Math.random() * 2.2,
            speed: 0.009 + Math.random() * 0.018,
            heightOffset: Math.random() * 1.4,
            vx: 0, vz: 0
          };
          resolve(m);
        }, undefined, reject);
      });
    }

    // Анімація рибок (однакова для AR та 3D)
    function animateFish() {
      const t = Date.now() * 0.001;
      models.forEach((m, i) => {
        if (!m.userData) return;
        m.userData.angle += m.userData.speed;

        const r = m.userData.radius;
        const dx = Math.cos(m.userData.angle + i);
        const dz = Math.sin(m.userData.angle + i);

        m.userData.vx *= 0.98;
        m.userData.vz *= 0.98;
        m.position.x += m.userData.vx;
        m.position.z += m.userData.vz;

        const maxDist = 4.5;
        let dist = Math.hypot(m.position.x, m.position.z + 3.5);
        if (dist > maxDist) {
          m.position.x *= maxDist / dist;
          m.position.z = (m.position.z + 3.5) * (maxDist / dist) - 3.5;
        }

        m.position.x += dx * r * 0.02;
        m.position.z += dz * r * 0.02;
        m.position.y = m.userData.heightOffset + Math.sin(t * 1.6 + i) * 0.75;

        const dir = new THREE.Vector3(dx, 0, dz).normalize();
        m.lookAt(m.position.clone().add(dir));
      });
    }

    // Створення групи рибок
    async function createWorldGroup() {
      const group = new THREE.Group();
      const paths = [
        'assets/models/animal1.glb',
        'assets/models/animal2.glb',
        'assets/models/animal3.glb',
        'assets/models/animal4.glb'
      ];
      const loaded = await Promise.all(paths.map(p => loadModel(p)));
      loaded.forEach(m => {
        if (m) {
          models.push(m);
          group.add(m);
        }
      });
      return group;
    }

    // --- Загальна ініціалізація Three.js ---
    function initThree() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x112244);
      scene.fog = new THREE.Fog(0x88bbff, 8, 40);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      // Освітлення
      const ambientLight = new THREE.AmbientLight(0xaaccff, 0.95);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.05);
      dirLight.position.set(5, 15, 10);
      scene.add(dirLight);
    }

    // --- Режим 3D (без AR) ---
    async function startNonAR() {
      initThree();
      worldGroup = await createWorldGroup();
      scene.add(worldGroup);
      worldGroup.position.set(0, 0, -5);
      worldGroup.visible = true;
      placed = true;

      // Орбітальне управління
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.enableZoom = true;
      controls.zoomSpeed = 1.0;
      controls.enablePan = true;
      controls.panSpeed = 0.5;

      camera.position.set(0, 2, 8);
      camera.lookAt(0, 0, 0);

      document.getElementById('info').innerHTML = '🐠 3D-режим (AR недоступна). Обертай сцену пальцем/мишею.';
      document.getElementById('controls-note').style.display = 'block';
      sound.play().catch(() => {});

      function animate() {
        requestAnimationFrame(animate);
        controls.update(); // оновлює камеру
        animateFish();
        renderer.render(scene, camera);
      }
      animate();
    }

    // --- AR режим (WebXR) ---
    async function startAR() {
      initThree();
      renderer.xr.enabled = true; // увімкнення WebXR

      worldGroup = await createWorldGroup();
      scene.add(worldGroup);
      worldGroup.visible = false;

      let hitTestSource = null;
      let referenceSpace = null;

      async function onSelect(event) {
        if (!placed && hitTestSource && referenceSpace) {
          const frame = renderer.xr.getFrame();
          if (!frame) return;
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(referenceSpace);
            if (pose) {
              worldGroup.position.copy(pose.transform.position);
              worldGroup.quaternion.copy(pose.transform.orientation);
              worldGroup.visible = true;
              placed = true;
              document.getElementById('info').innerHTML = '✅ Рибки з\'явились! Торкнись їх 🐟';
              sound.play().catch(() => {});
            }
          }
          return;
        }

        if (placed && worldGroup && hitTestSource && referenceSpace) {
          const frame = renderer.xr.getFrame();
          if (!frame) return;
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(referenceSpace);
            if (pose) {
              const touchPoint = pose.transform.position;
              models.forEach(m => {
                const dx = m.position.x - touchPoint.x;
                const dz = m.position.z - touchPoint.z;
                const dist = Math.sqrt(dx*dx + dz*dz) + 0.001;
                const force = 0.18 / dist;
                m.userData.vx += dx * force;
                m.userData.vz += dz * force;
              });
            }
          }
        }
      }

      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test']
        });
        renderer.xr.setSession(session);

        referenceSpace = await session.requestReferenceSpace('viewer');
        hitTestSource = await session.requestHitTestSource({ space: referenceSpace });

        renderer.domElement.addEventListener('touchstart', onSelect);

        renderer.setAnimationLoop((timestamp, frame) => {
          if (placed) animateFish();
          renderer.render(scene, camera);
        });

        document.getElementById('info').innerHTML = 'AR готовий. Торкніться поверхні, щоб розмістити рибок.';
        document.getElementById('btn').style.display = 'none';
      } catch (err) {
        console.error('AR session error:', err);
        document.getElementById('info').innerHTML = 'Не вдалося запустити AR. Запускаємо 3D-режим...';
        // Якщо AR не вдалося, переходимо на 3D
        startNonAR();
      }
    }

    // --- Головна функція, що вирішує, який режим запускати ---
    async function decideMode() {
      const btn = document.getElementById('btn');
      const info = document.getElementById('info');
      btn.style.display = 'none';
      info.innerHTML = 'Перевірка підтримки AR...';

      // Завантажуємо звук (необхідно для будь-якого режиму)
      sound = document.getElementById('sound');

      // Перевіряємо наявність WebXR
      if (!navigator.xr) {
        info.innerHTML = 'Ваш браузер не підтримує WebXR. Запускаємо 3D-режим.';
        await startNonAR();
        return;
      }

      // Перевіряємо, чи підтримується 'immersive-ar'
      let isSupported = false;
      try {
        isSupported = await navigator.xr.isSessionSupported('immersive-ar');
      } catch (e) {
        console.warn('isSessionSupported failed:', e);
      }

      if (!isSupported) {
        info.innerHTML = 'AR недоступна на цьому пристрої. Запускаємо 3D-режим.';
        await startNonAR();
      } else {
        // Пробуємо запустити AR (якщо не вдасться, startAR перейде на 3D)
        await startAR();
      }
    }

    // Кнопка запуску
    document.getElementById('btn').addEventListener('click', decideMode);
  </script>
</body>
</html>
