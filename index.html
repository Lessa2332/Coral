<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; }
        #overlay { 
            position:absolute; inset:0; z-index:100; pointer-events:none; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; color:white;
        }
        #enter-btn {
            padding:22px 70px; font-size:24px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 8px 30px rgba(0,191,255,0.6);
            font-weight:bold; pointer-events:auto;
        }
        #instruction { margin-bottom:30px; font-size:20px; text-align:center; text-shadow:0 2px 10px #000; }
        canvas { display:block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="instruction">Натисни кнопку для запуску AR</div>
        <button id="enter-btn" onclick="startAR()">🐬 ЗАПУСТИТИ ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        let scene, camera, renderer, worldGroup;
        let models = [];
        let isPlaced = false;

        async function loadModel(url, scale = 0.25) {
            return new Promise(resolve => {
                const loader = new THREE.GLTFLoader();
                loader.load(url, gltf => {
                    const model = gltf.scene;
                    model.scale.set(scale, scale, scale);
                    model.userData = { angle: Math.random()*Math.PI*2, radius: 3 + Math.random()*2 };
                    resolve(model);
                }, undefined, () => resolve(null));
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;

            models.forEach((m, i) => {
                if (!m.userData.angle) return;
                m.userData.angle += 0.015;
                const r = m.userData.radius;
                m.position.x = Math.cos(m.userData.angle + i) * r;
                m.position.z = Math.sin(m.userData.angle + i) * r - 3;
                m.position.y = 1 + Math.sin(t + i) * 0.8;
                m.lookAt(0, m.position.y, -3);
            });

            if (renderer) renderer.render(scene, camera);
        }

        async function startAR() {
            document.getElementById('instruction').innerHTML = "Запуск камери...";
            document.getElementById('enter-btn').style.display = 'none';

            // Ініціалізація Three.js
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);

            renderer = new THREE.WebGLRenderer({canvas, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            scene.add(new THREE.AmbientLight(0x88ccff, 0.9));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 8);
            scene.add(light);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Завантаження моделей
            const paths = ['assets/models/animal1.glb','assets/models/animal2.glb',
                           'assets/models/animal3.glb','assets/models/animal4.glb'];

            for (let p of paths) {
                const model = await loadModel(p, 0.24);
                if (model) {
                    models.push(model);
                    worldGroup.add(model);
                }
            }

            // Запуск 8th Wall
            try {
                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ]);

                await XR8.run({
                    canvas: renderer.domElement,
                    camera: camera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'
                });

                worldGroup.visible = true;
                document.getElementById('instruction').innerHTML = "✅ AR запущено!<br>Тапни на екран, щоб розмістити світ на підлозі";

                document.getElementById('ocean-sound').play().catch(() => {});
                animate();

                // Додаємо tap-to-place
                canvas.addEventListener('touchstart', (e) => {
                    if (isPlaced) return;
                    isPlaced = true;
                    // Просте переміщення групи в центр видимої області
                    worldGroup.position.set(0, -1.5, -4);
                    document.getElementById('instruction').innerHTML = "🐟 Світ розміщено! Рухай телефоном";
                });

            } catch (e) {
                console.error(e);
                document.getElementById('instruction').innerHTML = "Помилка запуску";
            }
        }

        window.startAR = startAR;
    </script>
</body>
</html>
