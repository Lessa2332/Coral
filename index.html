<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ — 8th Wall WebAR</title>

    <!-- 1. Основні бібліотеки -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <!-- 2. 8th Wall Engine (локальний файл з вашого репо) -->
    <script src="xr.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* UI Елементи */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .ui-element { pointer-events: auto; }

        #enter-btn { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; font-size: 22px; background: #00bfff; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #instruction { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 20px; text-align: center; font-size: 16px;
        }

        #reticle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 3px solid white; border-radius: 50%;
            display: none; transition: all 0.2s;
        }
        #reticle.ready { border-color: #00ffaa; box-shadow: 0 0 15px #00ffaa; scale: 1.2; }

        .hidden { display: none !important; }
    </style>

    <script>
        // ========== КОНФІГУРАЦІЯ 8TH WALL ==========
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/', // Шлях до .tflite файлів у вашому репо
        };

        // ========== КОМПОНЕНТ РУХУ РИБОК (Territory Swim) ==========
        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {type: 'float', default: 0.5}, radius: {type: 'float', default: 2} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (time, deltaTime) {
                this.angle += (this.data.speed * deltaTime) / 1000;
                const x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                const z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                this.el.object3D.position.set(x, this.el.object3D.position.y, z);
                this.el.object3D.lookAt(
                    this.initialPos.x + Math.cos(this.angle + 0.1) * this.data.radius,
                    this.el.object3D.position.y,
                    this.initialPos.z + Math.sin(this.angle + 0.1) * this.data.radius
                );
            }
        });

        // ========== КОМПОНЕНТ РОЗМІЩЕННЯ (Place on Tap) ==========
        AFRAME.registerComponent('place-on-tap', {
            init: function () {
                const scene = this.el;
                const worldGroup = document.querySelector('#world-group');
                const reticle = document.querySelector('#reticle');
                const instruction = document.querySelector('#instruction');
                this.placed = false;

                scene.addEventListener('click', (event) => {
                    if (this.placed) return;

                    // Використовуємо Hit Test від 8th Wall
                    window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then((hits) => {
                        if (hits.length > 0) {
                            const hit = hits[0];
                            worldGroup.object3D.position.copy(hit.position);
                            worldGroup.object3D.quaternion.copy(hit.rotation);
                            worldGroup.setAttribute('visible', 'true');
                            
                            this.placed = true;
                            reticle.style.display = 'none';
                            instruction.innerHTML = "🐟 Океан активовано! Досліджуйте навколо.";
                            setTimeout(() => instruction.style.display = 'none', 3000);
                        }
                    });
                });
            },
            tick: function() {
                if (this.placed || !window.XR8) return;
                
                // Візуальна логіка ретикули
                window.XR8.XrController.hitTest(0.5, 0.5, ['surface']).then((hits) => {
                    const r = document.querySelector('#reticle');
                    if (hits.length > 0) r.classList.add('ready');
                    else r.classList.remove('ready');
                });
            }
        });

        // ========== ЗАПУСК AR ==========
        function startAR() {
            const scene = document.querySelector('a-scene');
            const audio = document.getElementById('ocean-sound');

            // 1. Налаштовуємо пайплайни (ОБОВ'ЯЗКОВО ДЛЯ 8TH WALL)
            window.XR8.addCameraPipelineModules([
                window.XR8.GlTextureRenderer.pipelineModule(),
                window.XR8.Threejs.pipelineModule(),
                window.XR8.AFrame.pipelineModule(),
                window.XR8.XrController.pipelineModule(),
            ]);

            // 2. Запускаємо рушій
            window.XR8.run({ 
                canvas: scene.canvas,
                allowedDevices: window.XR8.XrConfig.device().ANY 
            });

            // 3. UI зміни
            document.getElementById('enter-btn').classList.add('hidden');
            document.getElementById('reticle').style.display = 'block';
            document.getElementById('instruction').innerHTML = "Наведіть на підлогу і торкніться, щоб плюхнути рибок";
            
            audio.play().catch(e => console.log("Audio play failed", e));
        }
    </script>
</head>
<body>

    <div id="overlay">
        <div id="instruction" class="ui-element">Завантаження підводного світу...</div>
        <div id="reticle"></div>
        <button id="enter-btn" class="ui-element" onclick="startAR()">🐬 УВІЙТИ В AR</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <!-- Сцена A-Frame з інтеграцією 8th Wall -->
    <a-scene
        place-on-tap
        xr-mode-ui="enabled: false"
        embedded
        renderer="colorManagement: true; antialias: true;">

        <a-assets>
            <!-- Завантажуємо моделі з вашої структури папок -->
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
            <a-asset-item id="m3" src="assets/models/animal3.glb"></a-asset-item>
            <a-asset-item id="m4" src="assets/models/animal4.glb"></a-asset-item>
            <a-asset-item id="m5" src="assets/models/animal5.glb"></a-asset-item>
            <a-asset-item id="m6" src="assets/models/animal6.glb"></a-asset-item>
            <a-asset-item id="m7" src="assets/models/animal7.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 5 2" intensity="1"></a-light>

        <!-- Група світу, яка з'явиться після кліку -->
        <a-entity id="world-group" visible="false">
            
            <!-- Рибка 1 -->
            <a-entity 
                gltf-model="#m1" 
                position="0 1 -2" 
                scale="0.2 0.2 0.2" 
                animation-mixer="clip: *; loop: repeat"
                territory-swim="speed: 0.6; radius: 1.5">
            </a-entity>

            <!-- Рибка 2 -->
            <a-entity 
                gltf-model="#m2" 
                position="1.5 0.5 -1" 
                scale="0.3 0.3 0.3" 
                animation-mixer="clip: *; loop: repeat"
                territory-swim="speed: 0.4; radius: 2.5">
            </a-entity>

            <!-- Рибка 3 -->
            <a-entity 
                gltf-model="#m3" 
                position="-1 1.2 -3" 
                scale="0.15 0.15 0.15" 
                animation-mixer="clip: *; loop: repeat"
                territory-swim="speed: 0.8; radius: 1.2">
            </a-entity>

            <!-- Додайте інші рибки аналогічно -->
            <a-entity gltf-model="#m4" position="2 1.5 -4" scale="0.2 0.2 0.2" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m5" position="-2 0.8 -2" scale="0.1 0.1 0.1" animation-mixer territory-swim></a-entity>

        </a-entity>

    </a-scene>

    <script>
        // Перевірка готовності 8th Wall
        window.addEventListener('load', () => {
            const check = setInterval(() => {
                if (window.XR8) {
                    clearInterval(check);
                    document.getElementById('instruction').innerHTML = "Все готово! Тисніть кнопку.";
                }
            }, 500);
        });
    </script>
</body>
</html>
