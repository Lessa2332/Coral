<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { 
            position: absolute; inset: 0; z-index: 100; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        #enter-btn {
            padding: 20px 60px; font-size: 24px; background: #00bfff; color: white;
            border: none; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,191,255,0.6);
            font-weight: bold; cursor: pointer; pointer-events: auto;
        }
        #instruction { margin-bottom: 30px; font-size: 21px; text-shadow: 0 2px 10px #000; text-align: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="instruction">Підготовка підводного світу...</div>
        <button id="enter-btn" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js';
        import { GLTFLoader } from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/jsm/loaders/GLTFLoader.js';

        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        let scene, camera, renderer;
        let worldGroup = new THREE.Group();
        let models = [];

        async function loadModel(url, scale = 0.25) {
            return new Promise((resolve) => {
                const loader = new GLTFLoader();
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(scale, scale, scale);
                    model.userData = { 
                        angle: Math.random() * Math.PI * 2, 
                        radius: 3.5 + Math.random() * 1.5,
                        speed: 0.4 + Math.random() * 0.3
                    };
                    resolve(model);
                }, undefined, (err) => {
                    console.error('Помилка завантаження моделі:', url, err);
                    resolve(null);
                });
            });
        }

        async function initThree() {
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            // Підводне освітлення
            scene.add(new THREE.AmbientLight(0x88ccff, 0.9));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
            dirLight.position.set(5, 10, 8);
            scene.add(dirLight);

            scene.add(worldGroup);

            // Завантажуємо твої моделі
            const modelPaths = [
                'assets/models/animal1.glb',
                'assets/models/animal2.glb',
                'assets/models/animal3.glb',
                'assets/models/animal4.glb'
            ];

            for (let path of modelPaths) {
                const model = await loadModel(path, 0.23);
                if (model) {
                    model.position.set((Math.random()-0.5)*6, 1 + Math.random()*2, -4 - Math.random()*4);
                    worldGroup.add(model);
                    models.push(model);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            models.forEach((model, i) => {
                if (!model.userData.angle) return;
                model.userData.angle += model.userData.speed * 0.015;
                const r = model.userData.radius;

                model.position.x = Math.cos(model.userData.angle + i) * r;
                model.position.z = Math.sin(model.userData.angle + i) * r - 3;
                model.position.y = 1.2 + Math.sin(time * 1.5 + i) * 0.9;

                model.lookAt(0, model.position.y, -2);
            });

            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        async function startAR() {
            document.getElementById('instruction').textContent = "Запуск AR...";

            await initThree();

            try {
                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ]);

                await XR8.run({
                    canvas: renderer.domElement,
                    camera: camera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'
                });

                worldGroup.visible = true;

                document.getElementById('enter-btn').style.display = 'none';
                document.getElementById('instruction').innerHTML = "✅ Підводний світ активовано!<br>Рухай телефоном 🐟";

                document.getElementById('ocean-sound').play().catch(() => {});
                animate();

                console.log("✅ Three.js + 8th Wall запущено");

            } catch (err) {
                console.error("Помилка:", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR.<br>Перевір консоль";
            }
        }

        window.startAR = startAR;
    </script>
</body>
</html>
