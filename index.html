<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
        #overlay { position:absolute; inset:0; z-index:100; pointer-events:none; }
        .ui { pointer-events:auto; }
        #enter-btn {
            position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
            padding:20px 55px; font-size:23px; background:#00bfff; color:white;
            border:none; border-radius:50px; box-shadow:0 6px 25px rgba(0,191,255,0.6);
            font-weight:bold;
        }
        #instruction { 
            position:absolute; top:50px; width:100%; text-align:center; 
            color:white; font-size:20px; text-shadow:0 2px 10px #000; 
        }
    </style>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        AFRAME.registerComponent('territory-swim', {
            schema: { speed: {default: 0.42}, radius: {default: 3.4} },
            init: function () {
                this.initialPos = this.el.object3D.position.clone();
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (t, dt) {
                if (dt > 300) return;
                this.angle += (this.data.speed * dt) / 1000;
                const p = this.el.object3D.position;
                p.x = this.initialPos.x + Math.cos(this.angle) * this.data.radius;
                p.z = this.initialPos.z + Math.sin(this.angle) * this.data.radius;
                p.y = this.initialPos.y + Math.sin(this.angle) * 0.6;
                this.el.object3D.lookAt(this.initialPos.x, p.y + 0.4, this.initialPos.z);
            }
        });
    </script>
</head>
<body>
    <div id="overlay">
        <div id="instruction" class="ui">Підготовка підводного світу...</div>
        <button id="enter-btn" class="ui" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <a-scene id="ar-scene" xr-mode-ui="enabled: false" embedded renderer="colorManagement: true; antialias: true;">
        <a-assets>
            <a-asset-item id="m1" src="assets/models/animal1.glb"></a-asset-item>
            <a-asset-item id="m2" src="assets/models/animal2.glb"></a-asset-item>
            <a-asset-item id="m3" src="assets/models/animal3.glb"></a-asset-item>
            <a-asset-item id="m4" src="assets/models/animal4.glb"></a-asset-item>
        </a-assets>

        <a-camera id="ar-camera" position="0 1.6 0"></a-camera>

        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="3 12 6" intensity="1.3"></a-light>

        <a-entity id="world-group" visible="false">
            <a-entity gltf-model="#m1" position="0 1.1 -3.2" scale="0.24 0.24 0.24" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m2" position="2.3 0.8 -2.7" scale="0.21 0.21 0.21" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m3" position="-2.2 1.4 -4.1" scale="0.19 0.19 0.19" animation-mixer territory-swim></a-entity>
            <a-entity gltf-model="#m4" position="1.6 0.6 -5.2" scale="0.26 0.26 0.26" animation-mixer territory-swim></a-entity>
        </a-entity>
    </a-scene>

    <script>
        async function startAR() {
            const scene = document.querySelector('#ar-scene');
            const cameraEl = document.querySelector('#ar-camera');

            if (!window.XR8) {
                alert("xr.js не завантажився. Перевір папку xr-standalone/");
                return;
            }

            // Довге очікування готовності камери
            let threeCamera = null;
            for (let i = 0; i < 40; i++) {
                threeCamera = cameraEl.getObject3D('camera');
                if (threeCamera) break;
                await new Promise(r => setTimeout(r, 120));
            }

            if (!threeCamera) {
                alert("Камера A-Frame не готова. Перезавантаж сторінку.");
                return;
            }

            try {
                console.log("Запуск XR8 з затримкою...");

                XR8.addCameraPipelineModules([
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ]);

                await XR8.run({
                    canvas: scene.canvas,
                    camera: threeCamera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'
                });

                document.querySelector('#world-group').setAttribute('visible', 'true');

                document.getElementById('enter-btn').classList.add('hidden');
                document.getElementById('instruction').innerHTML = "✅ Підводний світ активовано!<br>Рухай телефоном, щоб побачити риб 🐟";

                document.getElementById('ocean-sound').play().catch(() => {});
                console.log("✅ AR запущено успішно (з затримкою)");

            } catch (err) {
                console.error("Помилка XR8:", err);
                document.getElementById('instruction').innerHTML = "Не вдалося запустити AR.<br>Спробуй ще раз або на іншому пристрої";
            }
        }

        window.startAR = startAR;

        document.querySelector('a-scene').addEventListener('loaded', () => {
            document.getElementById('instruction').textContent = "Готово! Натисни кнопку нижче 👇";
        });
    </script>
</body>
</html>
