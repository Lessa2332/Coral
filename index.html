<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Підводний світ AR — Three.js</title>

    <script src="xr-standalone/xr.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { 
            position: absolute; inset: 0; z-index: 100; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #enter-btn {
            padding: 20px 60px; font-size: 24px; background: #00bfff; color: white;
            border: none; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,191,255,0.6);
            font-weight: bold; cursor: pointer; pointer-events: auto;
        }
        #instruction {
            color: white; font-size: 20px; text-align: center; margin-bottom: 30px;
            text-shadow: 0 2px 10px #000;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="instruction">Підготовка підводного світу...</div>
        <button id="enter-btn" onclick="startAR()">🐬 УВІЙТИ В ПІДВОДНИЙ СВІТ</button>
    </div>

    <audio id="ocean-sound" loop src="assets/sounds/okean.mp3"></audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"
            }
        }
    </script>

    <script>
        window.XR8Config = {
            webWorkerPath: 'resources/media-worker.js',
            tflitePath: 'resources/'
        };

        let scene, camera, renderer;
        let worldGroup;
        let models = [];
        let isPlaced = false;

        // Завантаження GLTF моделі
        async function loadModel(url, scale = 0.25) {
            return new Promise((resolve) => {
                const loader = new THREE.GLTFLoader();
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(scale, scale, scale);
                    // Додаємо просту анімацію обертання/плавання
                    model.userData = { angle: Math.random() * Math.PI * 2, radius: 3 + Math.random() * 2 };
                    resolve(model);
                }, undefined, (error) => {
                    console.error('Помилка завантаження моделі:', error);
                    resolve(null);
                });
            });
        }

        async function initThree() {
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            // Світло
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1.2);
            directional.position.set(5, 10, 7);
            scene.add(directional);

            // Контейнер для всього підводного світу
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Завантажуємо 4 моделі (можеш додати більше)
            const modelUrls = [
                'assets/models/animal1.glb',
                'assets/models/animal2.glb',
                'assets/models/animal3.glb',
                'assets/models/animal4.glb'
            ];

            for (let i = 0; i < modelUrls.length; i++) {
                const model = await loadModel(modelUrls[i], 0.22 + i * 0.03);
                if (model) {
                    model.position.set(
                        (Math.random() - 0.5) * 4,
                        0.5 + Math.random() * 2,
                        -3 - Math.random() * 3
                    );
                    worldGroup.add(model);
                    models.push(model);
                }
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            models.forEach((model, i) => {
                if (!model.userData.angle) return;
                model.userData.angle += 0.008 + i * 0.003;
                const r = model.userData.radius || 3.5;

                model.position.x = Math.cos(model.userData.angle) * r;
                model.position.z = Math.sin(model.userData.angle) * r - 3;
                model.position.y = 1 + Math.sin(time + i) * 0.8;

                model.lookAt(0, model.position.y, 0);
            });

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        async function startAR() {
            document.getElementById('instruction').textContent = "Запуск AR...";

            await initThree();

            try {
                const pipelineModules = [
                    XR8.GlTextureRenderer.pipelineModule(),
                    XR8.Threejs.pipelineModule()
                ];

                XR8.addCameraPipelineModules(pipelineModules);

                await XR8.run({
                    canvas: renderer.domElement,
                    camera: camera,
                    allowedDevices: 'any',
                    preferredCamera: 'environment'   // задня камера
                });

                // Показуємо світ
                worldGroup.visible = true;

                document.getElementById('enter-btn').style.display = 'none';
                document.getElementById('instruction').innerHTML = "✅ Підводний світ активовано!<br>Рухай телефоном";

                document.getElementById('ocean-sound').play().catch(() => {});

                animate();   // запускаємо анімацію

                console.log("✅ Three.js + 8th Wall запущено успішно");

            } catch (err) {
                console.error("Помилка запуску:", err);
                document.getElementById('instruction').innerHTML = "Помилка запуску AR.<br>Перевір консоль";
            }
        }

        // Глобальний доступ
        window.startAR = startAR;
    </script>

    <!-- GLTFLoader (потрібен для завантаження .glb) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/loaders/GLTFLoader.js"></script>
</body>
</html>
