<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підводний світ — Coral</title>
  
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/[email protected]/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin:0; overflow:hidden; font-family: 'Arial', sans-serif; }
    #enter-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 18px 40px; font-size: 24px; background: #00bfff; color: white;
      border: none; border-radius: 60px; z-index: 999; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,0.5); font-weight: bold;
    }
    #loading {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white; padding: 12px 24px;
      border-radius: 40px; z-index: 1000; display: none; font-size: 18px;
    }
    #status {
      position: absolute; top: 80px; left: 20px;
      background: rgba(0,0,0,0.5); color: #00ffaa; padding: 8px 16px;
      border-radius: 20px; font-size: 14px; z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="loading">🔍 Скануємо кімнату...</div>
  <div id="status">🌊 Підводний світ</div>
  
  <!-- Прихований аудіоелемент -->
  <audio id="ocean-sound" loop preload="auto">
    <source src="assets/sounds/okean.mp3" type="audio/mpeg">
  </audio>
  
  <button id="enter-btn">🐬 Увійти в AR</button>

  <!-- AR СЦЕНА -->
  <a-scene
    background="transparent"
    fog="type: linear; color: #88ccff; near: 2; far: 20"
    xr-mode-ui="enabled: false"
    vr-mode-ui="enabled: false"
    physics="gravity: 0;">

    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-light type="ambient" color="#88ccff" intensity="0.6"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.2" position="2 5 3"></a-light>
    
    <!-- Всі риби отримають компонент swim та proximity-interaction -->
    
    <!-- Риби (анімовані тіло) -->
    <a-entity id="fish1"
      gltf-model="url(assets/models/animal1.glb)"
      position="1 0.8 1"
      scale="0.3 0.3 0.3"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish">
    </a-entity>

    <a-entity id="fish2"
      gltf-model="url(assets/models/animal2.glb)"
      position="-1 1.2 -1"
      scale="0.35 0.35 0.35"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish">
    </a-entity>

    <a-entity id="fish3"
      gltf-model="url(assets/models/animal3.glb)"
      position="2 0.5 -2"
      scale="0.4 0.4 0.4"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish">
    </a-entity>

    <a-entity id="fish4"
      gltf-model="url(assets/models/animal4.glb)"
      position="-2 1.5 2"
      scale="0.3 0.3 0.3"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish">
    </a-entity>

    <a-entity id="fish6"
      gltf-model="url(assets/models/animal6.glb)"
      position="0.5 0.9 -2.5"
      scale="0.35 0.35 0.35"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish">
    </a-entity>

    <!-- Медуза -->
    <a-entity id="jellyfish"
      gltf-model="url(assets/models/animal7.glb)"
      position="1.5 1.8 0"
      scale="0.4 0.4 0.4"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature fish"> <!-- також буде плавати, але повільніше -->
    </a-entity>

    <!-- Морська зірка (на дно) -->
    <a-entity id="starfish"
      gltf-model="url(assets/models/animal5.glb)"
      position="2 0.1 1"
      scale="0.5 0.5 0.5"
      rotation="0 0 0"
      animation-mixer="clip: *; loop: repeat;"
      class="sea-creature star">
    </a-entity>

    <!-- Бульбашки -->
    <a-entity particle-system="preset: dust; color: #aaddff; particleCount: 80; velocity: 0.1 0.1 0; opacity: 0.4;"></a-entity>
  </a-scene>

  <script>
    // ========== НАЛАШТУВАННЯ 8TH WALL ==========
    window.XR8 = window.XR8 || {};
    XR8.assetRoot = './';
    XR8.addChunk('slam', 'xr-slam.js');
    
    const script = document.createElement('script');
    script.src = 'xr.js';
    script.async = true;
    script.setAttribute('data-preload-chunks', 'slam');
    document.head.appendChild(script);
    
    // ========== КОМПОНЕНТ ПЛАВАННЯ ==========
    AFRAME.registerComponent('swim', {
      schema: {
        speed: {type: 'number', default: 0.5},
        radius: {type: 'number', default: 3.0}, // межа по X/Z
        heightMin: {type: 'number', default: 0.5},
        heightMax: {type: 'number', default: 2.2},
        changeInterval: {type: 'number', default: 5} // секунд
      },
      init: function() {
        this.targetPos = new THREE.Vector3();
        this.timeSinceChange = 0;
        this.pickNewTarget();
      },
      pickNewTarget: function() {
        // Випадкова точка в межах акваріума
        this.targetPos.x = (Math.random() - 0.5) * 2 * this.data.radius;
        this.targetPos.z = (Math.random() - 0.5) * 2 * this.data.radius;
        this.targetPos.y = this.data.heightMin + Math.random() * (this.data.heightMax - this.data.heightMin);
      },
      tick: function(time, delta) {
        this.timeSinceChange += delta / 1000;
        if (this.timeSinceChange > this.data.changeInterval) {
          this.pickNewTarget();
          this.timeSinceChange = 0;
        }
        
        // Рух до цілі
        var currentPos = this.el.object3D.position;
        var direction = new THREE.Vector3().subVectors(this.targetPos, currentPos);
        var distance = direction.length();
        if (distance < 0.1) {
          this.pickNewTarget();
        } else {
          direction.normalize();
          var move = direction.multiplyScalar(this.data.speed * delta / 1000);
          this.el.object3D.position.add(move);
          
          // Поворот у напрямку руху
          if (move.length() > 0.001) {
            var quat = new THREE.Quaternion();
            quat.setFromUnitVectors(new THREE.Vector3(0,0,1), direction.clone().normalize());
            this.el.object3D.quaternion.slerp(quat, 0.1);
          }
        }
      }
    });
    
    // ========== КОМПОНЕНТ "ПОГЛАДИТИ" (оновлений) ==========
    AFRAME.registerComponent('proximity-interaction', {
      init: function() {
        this.camera = document.querySelector('#camera');
        this.nearby = false;
      },
      tick: function() {
        if (!this.camera) return;
        const camPos = this.camera.object3D.position;
        const entityPos = this.el.object3D.position;
        const dist = camPos.distanceTo(entityPos);
        
        if (dist < 0.7 && !this.nearby) {
          this.nearby = true;
          
          // Змінюємо напрямок (якщо це риба)
          if (this.el.components.swim) {
            this.el.components.swim.pickNewTarget();
          }
          
          // Візуальний ефект
          this.el.setAttribute('material', 'emissive', '#ffaa00');
          
          // Можна додати звук (бульк)
          // this.el.emit('playSound');
          
        } else if (dist >= 0.7 && this.nearby) {
          this.nearby = false;
          this.el.setAttribute('material', 'emissive', '#000000');
        }
      }
    });
    
    // ========== ЛОГІКА AR ==========
    const enterBtn = document.getElementById('enter-btn');
    const loadingDiv = document.getElementById('loading');
    const oceanSound = document.getElementById('ocean-sound');
    
    function startAR() {
      loadingDiv.style.display = 'block';
      loadingDiv.innerHTML = '🔍 Завантаження SLAM...';
      
      // Запускаємо звук (потрібна взаємодія користувача)
      oceanSound.play().catch(e => console.log('Audio play failed:', e));
      
      if (typeof XR8 === 'undefined' || !XR8.XrController) {
        loadingDiv.innerHTML = '⏳ Очікування 8th Wall...';
        setTimeout(startAR, 1000);
        return;
      }
      
      loadingDiv.innerHTML = '✅ Готово! Запускаємо AR...';
      
      XR8.XrController.configure({ 
        disableWorldTracking: false,
        disableImageTargets: true,
        disableFaceTracking: true 
      });
      
      XR8.run({ canvas: document.querySelector('a-scene canvas') });
      
      setTimeout(() => {
        loadingDiv.style.display = 'none';
      }, 2000);
    }
    
    enterBtn.addEventListener('click', startAR);
    
    // ========== ІНІЦІАЛІЗАЦІЯ ==========
    window.addEventListener('load', () => {
      // Додаємо компонент swim до всіх риб (крім зірки)
      document.querySelectorAll('.fish').forEach(el => {
        el.setAttribute('swim', '');
        el.setAttribute('proximity-interaction', '');
      });
      
      // Зірці тільки взаємодію
      document.querySelector('.star').setAttribute('proximity-interaction', '');
      
      // Можна налаштувати швидкість для медузи (повільніше)
      const jelly = document.getElementById('jellyfish');
      if (jelly) jelly.setAttribute('swim', 'speed: 0.2; heightMax: 2.5;');
    });
  </script>
</body>
</html>
