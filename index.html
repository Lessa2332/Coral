<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підводний світ — Coral</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐠</text></svg>">
  
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin:0; overflow:hidden; font-family: 'Arial', sans-serif; }
    #enter-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 18px 40px; font-size: 24px; background: #00bfff; color: white;
      border: none; border-radius: 60px; z-index: 999; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,191,255,0.5); font-weight: bold;
    }
    #loading {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white; padding: 12px 24px;
      border-radius: 40px; z-index: 1000; display: none; font-size: 18px;
    }
    #status {
      position: absolute; top: 80px; left: 20px;
      background: rgba(0,0,0,0.5); color: #00ffaa; padding: 8px 16px;
      border-radius: 20px; font-size: 14px; z-index: 1000;
    }
    #instruction {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); color: white; padding: 20px 40px;
      border-radius: 60px; font-size: 28px; z-index: 2000; text-align: center;
      display: none; pointer-events: none; white-space: nowrap;
      border: 2px solid #00bfff; box-shadow: 0 0 30px #00bfff;
    }
    /* Ретикл (приціл) */
    #reticle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%; background: transparent; z-index: 1500;
      display: none; pointer-events: none;
      box-shadow: 0 0 10px #00bfff;
    }
    .controls {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: flex; gap: 20px;
    }
    .controls button {
      padding: 10px 20px; font-size: 20px; background: rgba(0,0,0,0.5);
      color: white; border: none; border-radius: 30px; cursor: pointer;
    }
    #mute-btn {
      position: absolute; bottom: 30px; right: 30px;
      padding: 12px 24px; font-size: 18px; background: rgba(0,0,0,0.6);
      color: white; border: none; border-radius: 40px; z-index: 1000;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loading">🔍 Завантаження...</div>
  <div id="status">🌊 Підводний світ</div>
  <div id="instruction">👇 Торкнись поверхні, де буде океан</div>
  <div id="reticle"></div>
  
  <audio id="ocean-sound" loop preload="auto" src="assets/sounds/okean.mp3"></audio>
  
  <button id="enter-btn">🐬 Увійти в AR</button>
  
  <div class="controls hidden">
    <button id="scale-down">➖</button>
    <button id="scale-up">➕</button>
  </div>
  <button id="mute-btn" class="hidden">🔇 Вимкнути звук</button>

  <a-scene
    background="transparent"
    xr-mode-ui="enabled: false"
    vr-mode-ui="enabled: false">

    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="2 5 3"></a-light>
    
    <!-- Група, яка буде переміщуватись при тапу -->
    <a-entity id="world-group">
      <!-- Риби -->
      <a-entity id="fish1"
        gltf-model="url(assets/models/animal1.glb)"
        position="1.5 0.8 1"
        scale="0.15 0.15 0.15"
        animation-mixer="clip: *; loop: repeat;"
        class="fish"
        data-anchor="1.5 0.8 1"
        data-radius="1.2"
        data-speed="0.5">
      </a-entity>

      <a-entity id="fish2"
        gltf-model="url(assets/models/animal2.glb)"
        position="-1.8 1.0 -1.5"
        scale="0.16 0.16 0.16"
        animation-mixer="clip: *; loop: repeat;"
        class="fish"
        data-anchor="-1.8 1.0 -1.5"
        data-radius="1.3"
        data-speed="0.6">
      </a-entity>

      <a-entity id="fish3"
        gltf-model="url(assets/models/animal3.glb)"
        position="2.2 0.6 -2.0"
        scale="0.18 0.18 0.18"
        animation-mixer="clip: *; loop: repeat;"
        class="fish"
        data-anchor="2.2 0.6 -2.0"
        data-radius="1.4"
        data-speed="0.55">
      </a-entity>

      <a-entity id="fish4"
        gltf-model="url(assets/models/animal4.glb)"
        position="-2.0 1.5 2.2"
        scale="0.14 0.14 0.14"
        animation-mixer="clip: *; loop: repeat;"
        class="fish"
        data-anchor="-2.0 1.5 2.2"
        data-radius="1.5"
        data-speed="0.5">
      </a-entity>

      <a-entity id="fish6"
        gltf-model="url(assets/models/animal6.glb)"
        position="0.8 1.2 -2.5"
        scale="0.15 0.15 0.15"
        animation-mixer="clip: *; loop: repeat;"
        class="fish"
        data-anchor="0.8 1.2 -2.5"
        data-radius="1.2"
        data-speed="0.6">
      </a-entity>

      <!-- Медуза -->
      <a-entity id="jellyfish"
        gltf-model="url(assets/models/animal7.glb)"
        position="1.2 2.3 0.5"
        scale="0.1 0.1 0.1"
        animation-mixer="clip: *; loop: repeat;"
        class="fish jelly"
        data-anchor="1.2 2.3 0.5"
        data-radius="1.0"
        data-speed="0.2">
      </a-entity>

      <!-- Морська зірка -->
      <a-entity id="starfish"
        gltf-model="url(assets/models/animal5.glb)"
        position="2.0 0.05 1.0"
        scale="0.15 0.15 0.15"
        class="star">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    // ========== 8TH WALL ==========
    (function loadXR() {
      const script = document.createElement('script');
      script.src = 'xr.js';
      script.async = true;
      script.setAttribute('data-preload-chunks', 'slam');
      script.onload = () => console.log('8th Wall завантажено');
      script.onerror = () => console.error('Не вдалося завантажити xr.js');
      document.head.appendChild(script);
    })();

    // ========== КОМПОНЕНТ ПЛАВАННЯ ==========
    AFRAME.registerComponent('territory-swim', {
      schema: {
        speed: {type: 'number', default: 0.5},
        radius: {type: 'number', default: 1.5},
        changeInterval: {type: 'number', default: 6}
      },
      init: function() {
        this.anchor = this.el.object3D.position.clone();
        const anchorAttr = this.el.getAttribute('data-anchor');
        if (anchorAttr) {
          const parts = anchorAttr.split(' ').map(Number);
          if (parts.length === 3) this.anchor.set(parts[0], parts[1], parts[2]);
        }
        this.targetPos = this.anchor.clone();
        this.timeSinceChange = 0;
        this.pickNewTarget();
      },
      pickNewTarget: function() {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * this.data.radius;
        const dx = Math.cos(angle) * r;
        const dz = Math.sin(angle) * r;
        const dy = (Math.random() - 0.5) * this.data.radius * 0.3;
        this.targetPos.x = this.anchor.x + dx;
        this.targetPos.z = this.anchor.z + dz;
        this.targetPos.y = Math.max(0.3, Math.min(2.5, this.anchor.y + dy));
      },
      tick: function(time, delta) {
        this.timeSinceChange += delta / 1000;
        if (this.timeSinceChange > this.data.changeInterval) {
          this.pickNewTarget();
          this.timeSinceChange = 0;
        }
        const currentPos = this.el.object3D.position;
        const direction = new THREE.Vector3().subVectors(this.targetPos, currentPos);
        const distance = direction.length();
        if (distance < 0.1) {
          this.pickNewTarget();
        } else {
          direction.normalize();
          const move = direction.multiplyScalar(this.data.speed * delta / 1000);
          this.el.object3D.position.add(move);
          if (move.length() > 0.001) {
            const angle = Math.atan2(move.x, move.z);
            this.el.object3D.rotation.y = angle;
          }
        }
      }
    });

    // ========== ВЗАЄМОДІЯ ==========
    AFRAME.registerComponent('proximity-interaction', {
      init: function() {
        this.camera = document.querySelector('#camera');
        this.nearby = false;
      },
      tick: function() {
        if (!this.camera) return;
        const camPos = this.camera.object3D.position;
        const entityPos = this.el.object3D.position;
        const dist = camPos.distanceTo(entityPos);
        if (dist < 0.7 && !this.nearby) {
          this.nearby = true;
          if (this.el.components['territory-swim']) {
            this.el.components['territory-swim'].pickNewTarget();
          }
          this.el.setAttribute('material', 'emissive', '#ffaa00');
        } else if (dist >= 0.7 && this.nearby) {
          this.nearby = false;
          this.el.setAttribute('material', 'emissive', '#000000');
        }
      }
    });

    // ========== ІНТЕРФЕЙС ==========
    const enterBtn = document.getElementById('enter-btn');
    const loadingDiv = document.getElementById('loading');
    const statusDiv = document.getElementById('status');
    const instructionDiv = document.getElementById('instruction');
    const reticleDiv = document.getElementById('reticle');
    const controls = document.querySelector('.controls');
    const muteBtn = document.getElementById('mute-btn');
    const oceanSound = document.getElementById('ocean-sound');
    const scaleDown = document.getElementById('scale-down');
    const scaleUp = document.getElementById('scale-up');
    const worldGroup = document.getElementById('world-group');

    let currentScale = 0.15;
    function setAllScale(multiplier) {
      currentScale = Math.max(0.08, Math.min(0.4, multiplier));
      document.querySelectorAll('.fish, .jelly, .star').forEach(el => {
        const base = el.classList.contains('jelly') ? 0.1 : (el.classList.contains('star') ? 0.15 : 0.15);
        const factor = currentScale / 0.15;
        el.setAttribute('scale', `${base * factor} ${base * factor} ${base * factor}`);
      });
    }

    scaleDown.addEventListener('click', () => setAllScale(currentScale - 0.02));
    scaleUp.addEventListener('click', () => setAllScale(currentScale + 0.02));

    muteBtn.addEventListener('click', () => {
      oceanSound.muted = !oceanSound.muted;
      muteBtn.textContent = oceanSound.muted ? '🔊 Увімкнути звук' : '🔇 Вимкнути звук';
    });

    // ========== ЗАПУСК AR ==========
    function startAR() {
      loadingDiv.style.display = 'block';
      loadingDiv.innerHTML = '🔍 Запуск AR...';

      oceanSound.play().catch(e => console.warn('Аудіо не запустилось:', e));

      const checkXR8 = setInterval(() => {
        if (typeof XR8 !== 'undefined' && XR8.XrController) {
          clearInterval(checkXR8);

          XR8.XrController.configure({
            disableWorldTracking: false,
            disableImageTargets: true,
            disableFaceTracking: true
          });

          XR8.run({ canvas: document.querySelector('a-scene canvas') });

          // Показуємо інструкцію та ретикл після запуску
          instructionDiv.style.display = 'block';
          reticleDiv.style.display = 'block';
          enterBtn.classList.add('hidden');
          loadingDiv.style.display = 'none';
          statusDiv.innerHTML = '🌊 Торкнись поверхні';
        }
      }, 500);
    }

    enterBtn.addEventListener('click', startAR);

    // ========== ОБРОБКА ТАПУ ДЛЯ РОЗМІЩЕННЯ СВІТУ ==========
    let isPlacing = false;

    document.addEventListener('click', (event) => {
      if (!worldGroup || worldGroup.getAttribute('data-placed') === 'true') return;
      if (isPlacing) return;
      isPlacing = true;

      const sceneEl = document.querySelector('a-scene');
      if (!sceneEl || !sceneEl.canvas) return;

      // Отримуємо координати кліку відносно canvas
      const rect = sceneEl.canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;   // 0..1
      const y = (event.clientY - rect.top) / rect.height;   // 0..1

      if (window.XR8 && XR8.XrController) {
        XR8.XrController.hitTest(x, y)
          .then((hits) => {
            if (hits && hits.length > 0) {
              // Беремо перший (найкращий) результат
              const hit = hits[0];
              const pos = hit.position;  // [x, y, z]

              // Встановлюємо позицію групи
              worldGroup.object3D.position.set(pos[0], pos[1], pos[2]);

              // Можна додати невелике зміщення вгору, якщо потрібно
              // worldGroup.object3D.position.y += 0.02;

              worldGroup.setAttribute('data-placed', 'true');
              instructionDiv.style.display = 'none';
              reticleDiv.style.display = 'none';
              controls.classList.remove('hidden');
              muteBtn.classList.remove('hidden');
              statusDiv.innerHTML = '🌊 AR активний — насолоджуйся!';

              console.log('Розміщено на позиції:', pos);
            } else {
              console.log('Hit test не знайшов поверхню');
              statusDiv.innerHTML = '🌊 Не вдалося знайти поверхню — спробуй ще раз';
            }
            isPlacing = false;
          })
          .catch((e) => {
            console.error('Hit test error:', e);
            isPlacing = false;
          });
      } else {
        // Fallback якщо XR8 ще не готовий
        instructionDiv.style.display = 'none';
        reticleDiv.style.display = 'none';
        isPlacing = false;
      }
    });

    // ========== ІНІЦІАЛІЗАЦІЯ ==========
    window.addEventListener('load', () => {
      document.querySelectorAll('.fish').forEach(el => {
        const speed = parseFloat(el.getAttribute('data-speed') || 0.5);
        const radius = parseFloat(el.getAttribute('data-radius') || 1.5);
        el.setAttribute('territory-swim', { speed, radius });
        el.setAttribute('proximity-interaction', '');
      });

      const jelly = document.getElementById('jellyfish');
      if (jelly) {
        jelly.setAttribute('territory-swim', { speed: 0.2, radius: 1.0 });
        jelly.setAttribute('proximity-interaction', '');
      }

      const star = document.getElementById('starfish');
      if (star) star.setAttribute('proximity-interaction', '');

      // Індикація завантаження моделей
      const models = document.querySelectorAll('[gltf-model]');
      let loaded = 0;
      models.forEach(el => {
        el.addEventListener('model-loaded', () => {
          loaded++;
          if (loaded === models.length) {
            loadingDiv.innerHTML = '✅ Готово!';
            setTimeout(() => loadingDiv.style.display = 'none', 1000);
          }
        });
      });
    });
  </script>
</body>
</html>
